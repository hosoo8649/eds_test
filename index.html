") ? 12 : 5,\n                    }}\n                  >\n                    {sig ? (\n                      <img\n                        src={sig}\n                        alt=\"서명\"\n                        style={{\n                          width: \"80%\",\n                          height: \"65%\",\n                          objectFit: \"contain\",\n                          mixBlendMode: \"multiply\",\n                        }}\n                      />\n                    ) : (\n                      <span\n                        style={{\n                          display: \"flex\",\n                          alignItems: \"center\",\n                          gap: 6,\n                          color: EDS_COLOR.text.error,\n                          fontSize: 14,\n                          fontWeight: 800,\n                        }}\n                      >\n                        <PenTool size={20} /> 서명하기\n                      </span>\n                    )}\n                  </div>\n                </div>\n              </div>\n            </div>\n          </div>\n          {isCompact && (\n            <div\n              style={{\n                position: \"absolute\",\n                left: 0,\n                right: 0,\n                bottom: 0,\n                zIndex: 40,\n                background: \"linear-gradient(to top, rgba(255,255,255,1) 58%, rgba(255,255,255,0))\",\n                padding: \"6px 11px 13px\",\n              }}\n            >\n              <button\n                {...getEdsProps(\"BUTTON\", {\n                  category: \"DIRECT\",\n                  size: \"XL\",\n                  variant: \"primary\",\n                  state: isComplete ? \"completed\" : \"enabled\",\n                })}\n                type=\"button\"\n                onClick={nextAction}\n                style={{\n                  width: \"100%\",\n                  height: 56,\n                  borderRadius: RADIUS.scale.xl,\n                  border: \"none\",\n                  background: isComplete ? EDS_COLOR.text.success : EDS_COLOR.border.focus,\n                  color: EDS_COLOR.background.surface,\n                  fontSize: 16,\n                  fontWeight: 800,\n                  display: \"flex\",\n                  alignItems: \"center\",\n                  justifyContent: \"center\",\n                  gap: 5,\n                }}\n              >\n                {isComplete ? (\n                  <>\n                    <Check size={16} strokeWidth={3} /> 서명 완료하기\n                  </>\n                ) : filledReq === 0 ? (\n                  <>\n                    서명 시작하기 <ChevronRight size={16} strokeWidth={3} />\n                  </>\n                ) : (\n                  <>\n                    다음 필수 항목{\" \"}\n                    <span\n                      style={{\n                        background: \"rgba(255,255,255,.25)\",\n                        borderRadius: RADIUS.scale.circle,\n                        padding: \"2px 9px\",\n                        fontSize: 11,\n                        fontWeight: 800,\n                      }}\n                    >\n                      {filledReq}/{totalReq}\n                    </span>\n                    <ChevronRight size={14} strokeWidth={3} />\n                  </>\n                )}\n              </button>\n            </div>\n          )}\n        </main>\n        {!isCompact && !rightCollapsed && (\n            <RightPanel\n              fields={visibleFields}\n              activeField={activeField}\n              activeGroup={activeGroup}\n              onSign={() => setShowSig(true)}\n              filledReq={filledReq}\n              totalReq={totalReq}\n              isComplete={isComplete}\n              onComplete={nextAction}\n              onToggle={() => setRightCollapsed(true)}\n              onScrollTo={(id, options = {}) => {\n                if (!id) return;\n                const field = fieldById[id];\n                if (!field) return;\n                setActiveField(field.group ? null : id);\n                setActiveGroup(field.group || null);\n                scrollToField(\n                  id,\n                  field.id === \"sign\" ? () => setShowSig(true) : undefined,\n                  { pulse: Boolean(options.pulse) },\n                );\n              }}\n            />\n          )}\n      </div>\n    </div>\n  );\n}\n\n// ============================================================================\n// 13. 애플리케이션 진입점\n// ============================================================================\n\nfunction App() {\n  const appWidth = useWindowWidth(1024);\n  const appIsCompact = appWidth < BP_TABLET;\n  const [step, setStep] = useState(\"sign\");\n  const [authStep, setAuthStep] = useState(\"phone\");\n  const hasInitialMessage = true;\n  // 프로토타입은 2단계 수신 화면을 기준으로 표시합니다.\n  // 실제 서비스에서는 현재 수신인의 단계 값을 전달합니다.\n  const currentRecipientStep = 2;\n\n  const renderSigningView = () => (\n    <SigningView\n      recipientStep={currentRecipientStep}\n      onComplete={(result) =>\n        setStep(result === \"rejected\" ? \"rejected\" : \"done\")\n      }\n    />\n  );\n\n  if (step === \"done\")\n    return (\n      <>\n        <style>{GLOBAL_STYLES}</style>\n        <ResultModal\n          type=\"done\"\n          recipientStep={currentRecipientStep}\n          onConfirm={() => setStep(\"sign\")}\n        />\n      </>\n    );\n  if (step === \"rejected\")\n    return (\n      <>\n        <style>{GLOBAL_STYLES}</style>\n        <ResultModal\n          type=\"rejected\"\n          recipientStep={currentRecipientStep}\n          onConfirm={() => setStep(\"sign\")}\n        />\n      </>\n    );\n\n  return (\n    <>\n      <style>{GLOBAL_STYLES}</style>\n\n      {authStep === \"phone\" && (\n        <PhoneAuthScreen onVerified={() => setAuthStep(\"password\")} />\n      )}\n      {authStep === \"password\" && (\n        <PasswordAuthScreen onVerified={() => setAuthStep(\"consent\")} />\n      )}\n      {authStep === \"consent\" && (\n        <SignatureConsentScreen\n          onAgree={() => setAuthStep(hasInitialMessage ? \"message\" : \"ready\")}\n        />\n      )}\n\n      {(authStep === \"message\" ||\n        authStep === \"ready\" ||\n        authStep == null ||\n        authStep === \"\") &&\n        renderSigningView()}\n\n      {authStep === \"message\" && (\n        <SimpleInfoDialog\n          isCompact={appIsCompact}\n          type=\"messages\"\n          onClose={() => setAuthStep(\"ready\")}\n        />\n      )}\n    </>\n  );\n}\n";
