ct(() => {\n    if (!open) return undefined;\n    const handleOutsideClick = (event) => {\n      if (!rootRef.current?.contains(event.target)) setOpen(false);\n    };\n    document.addEventListener(\"mousedown\", handleOutsideClick);\n    return () => document.removeEventListener(\"mousedown\", handleOutsideClick);\n  }, [open]);\n\n  const selectOption = (option) => {\n    field.setter(option);\n    setOpen(false);\n    onFocus(field.id);\n  };\n\n  return (\n    <div ref={rootRef} style={{ position: \"relative\" }}>\n      <button\n        {...getEdsProps(\"SELECT\", {\n          size: \"L\",\n          category: \"DIRECT\",\n          state: focused ? \"focus\" : filled ? \"completed\" : \"default\",\n        })}\n        type=\"button\"\n        aria-haspopup=\"listbox\"\n        aria-expanded={open}\n        onFocus={() => onFocus(field.id)}\n        onMouseEnter={() => setHoveredTrigger(true)}\n        onMouseLeave={() => setHoveredTrigger(false)}\n        onClick={(event) => {\n          event.stopPropagation();\n          onFocus(field.id);\n          setOpen((current) => !current);\n        }}\n        style={{\n          width: \"100%\",\n          height: 48,\n          boxSizing: \"border-box\",\n          borderRadius: RADIUS.scale.lg,\n          border: `${triggerBorderWidth}px solid ${triggerBorderColor}`,\n          outline: \"none\",\n          background: filled\n            ? FIELD_STATE.completed.bg\n            : EDS_COLOR.background.surface,\n          boxShadow: triggerShadow,\n          padding: \"0 16px\",\n          fontSize: 16,\n          color: field.value ? EDS_COLOR.text.primary : EDS_COLOR.text.tertiary,\n          display: \"flex\",\n          alignItems: \"center\",\n          gap: 8,\n          cursor: \"pointer\",\n        }}\n      >\n        <span\n          style={{\n            flex: 1,\n            minWidth: 0,\n            textAlign: \"left\",\n            overflow: \"hidden\",\n            textOverflow: \"ellipsis\",\n            whiteSpace: \"nowrap\",\n            fontWeight: 400,\n          }}\n        >\n          {field.value || \"선택해주세요\"}\n        </span>\n        <ChevronDown\n          size={20}\n          color={EDS_COLOR.icon.secondary}\n          style={{\n            transform: open ? \"rotate(180deg)\" : \"rotate(0deg)\",\n            transition: \"transform .15s ease\",\n            flexShrink: 0,\n          }}\n        />\n      </button>\n\n      {open && (\n        <div\n          {...getEdsProps(\"SELECT.dropdownItem\", {\n            size: \"M\",\n            category: \"DIRECT\",\n          })}\n          className=\"anim-su\"\n          role=\"listbox\"\n          style={{\n            position: \"absolute\",\n            left: 0,\n            right: 0,\n            top: \"calc(100% + 8px)\",\n            zIndex: 80,\n            padding: 4,\n            borderRadius: RADIUS.scale.lg,\n            border: `1px solid ${EDS_COLOR.border.default}`,\n            background: EDS_COLOR.background.surface,\n            boxShadow: \"0 8px 24px rgba(15,23,42,.12)\",\n            maxHeight: 236,\n            overflowY: \"auto\",\n          }}\n        >\n          {field.options.map((option) => {\n            const selected = field.value === option;\n            const hovered = hoveredOption === option;\n\n            return (\n              <button\n                key={option}\n                type=\"button\"\n                role=\"option\"\n                aria-selected={selected}\n                onMouseEnter={() => setHoveredOption(option)}\n                onMouseLeave={() => setHoveredOption(null)}\n                onClick={(event) => {\n                  event.stopPropagation();\n                  selectOption(option);\n                }}\n                style={{\n                  width: \"100%\",\n                  height: 44,\n                  boxSizing: \"border-box\",\n                  border: \"none\",\n                  borderRadius: RADIUS.scale.md,\n                  background: hovered\n                    ? EDS_COLOR.background.disabled\n                    : EDS_COLOR.background.surface,\n                  color: EDS_COLOR.text.primary,\n                  display: \"flex\",\n                  alignItems: \"center\",\n                  gap: 8,\n                  padding: \"0 16px\",\n                  cursor: \"pointer\",\n                  fontSize: 16,\n                  fontWeight: selected ? 700 : 400,\n                  textAlign: \"left\",\n                }}\n              >\n                <span\n                  style={{\n                    flex: 1,\n                    minWidth: 0,\n                    overflow: \"hidden\",\n                    textOverflow: \"ellipsis\",\n                    whiteSpace: \"nowrap\",\n                  }}\n                >\n                  {option}\n                </span>\n                <span\n                  aria-hidden=\"true\"\n                  style={{\n                    width: 20,\n                    height: 20,\n                    flexShrink: 0,\n                    display: \"flex\",\n                    alignItems: \"center\",\n                    justifyContent: \"center\",\n                  }}\n                >\n                  {selected && (\n                    <Check\n                      size={20}\n                      color={EDS_COLOR.border.focus}\n                      strokeWidth={3}\n                    />\n                  )}\n                </span>\n              </button>\n            );\n          })}\n        </div>\n      )}\n    </div>\n  );\n}\n\n/**\n * DIRECT: EDS FIELD_BUTTON v11.10.\n * Type A는 날짜·파일·서명처럼 값을 선택하는 입력형 트리거,\n * Type B는 문서의 필드 위치 보기 같은 보조 유틸리티 액션에 사용합니다.\n */\nfunction EdsFieldButton({\n  value,\n  placeholder,\n  active = false,\n  disabled = false,\n  onClick,\n  prefixIcon,\n  suffixIcon,\n  ariaLabel,\n  variant = \"typeA\",\n  size = \"L\",\n}) {\n  const [hovered, setHovered] = useState(false);\n  const [focused, setFocused] = useState(false);\n  const isFocus = active || focused;\n  const isTypeB = variant === \"typeB\";\n  const hasValue = value !== undefined && value !== null && String(value).length > 0;\n  const height = size === \"M\" ? 40 : 48;\n  const text = hasValue ? value : placeholder;\n  const background = disabled\n    ? EDS_PALETTE.Gray[50]\n    : isTypeB\n      ? hovered\n        ? EDS_PALETTE.Gray[200]\n        : EDS_PALETTE.Gray[100]\n      : EDS_COLOR.background.surface;\n  const borderColor = isFocus\n    ? EDS_COLOR.border.focus\n    : isTypeB\n      ? \"transparent\"\n      : hovered\n        ? EDS_PALETTE.Gray[400]\n        : EDS_PALETTE.Gray[200];\n  return (\n    <button\n      {...getEdsProps(\"FIELD_BUTTON\", {\n        category: \"DIRECT\",\n        size,\n        variant: isTypeB ? \"Type B\" : \"Type A\",\n        state: disabled ? \"disabled\" : isFocus ? \"focus\" : hovered ? \"hover\" : \"enabled\",\n      })}\n      type=\"button\"\n      aria-label={ariaLabel}\n      disabled={disabled}\n      onMouseEnter={() => !disabled && setHovered(true)}\n      onMouseLeave={() => setHovered(false)}\n      onFocus={() => setFocused(true)}\n      onBlur={() => setFocused(false)}\n      onClick={onClick}\n      style={{\n        width: \"100%\",\n        height,\n        boxSizing: \"border-box\",\n        borderRadius: RADIUS.scale.lg,\n        border: `${isFocus ? 2 : 1}px solid ${borderColor}`,\n        outline: \"none\",\n        background,\n        boxShadow: isFocus ? focusShadow : \"none\",\n        padding: isFocus ? \"0 15px\" : \"0 16px\",\n        display: \"flex\",\n        alignItems: \"center\",\n        justifyContent: \"space-between\",\n        gap: 8,\n        cursor: disabled ? \"not-allowed\" : \"pointer\",\n        color: disabled\n          ? EDS_PALETTE.Gray[400]\n          : hasValue || isTypeB\n            ? EDS_PALETTE.Gray[900]\n            : EDS_PALETTE.Gray[400],\n        fontSize: size === \"M\" ? 14 : 16,\n        fontWeight: 400,\n        lineHeight: 1.5,\n        textAlign: \"left\",\n        transition:\n          \"background 120ms ease, border-color 120ms ease, box-shadow 120ms ease\",\n      }}\n    >\n      {prefixIcon && (\n        <span\n          aria-hidden=\"true\"\n          style={{ display: \"flex\", flexShrink: 0, color: EDS_PALETTE.Gray[600] }}\n        >\n          {prefixIcon}\n        </span>\n      )}\n      <span\n        aria-hidden=\"true\"\n        style={{\n          flex: 1,\n          minWidth: 0,\n          overflow: \"hidden\",\n          textOverflow: \"ellipsis\",\n          whiteSpace: \"nowrap\",\n        }}\n      >\n        {text}\n      </span>\n      {suffixIcon && (\n        <span\n          aria-hidden=\"true\"\n          style={{ display: \"flex\", flexShrink: 0, color: EDS_PALETTE.Gray[600] }}\n        >\n          {suffixIcon}\n        </span>\n      )}\n    </button>\n  );\n}\n\nfunction FilePanelField({ field, active, onFocus }) {\n  const inputRef = useRef(null);\n  const isImageField = [\"image\", \"picture\"].includes(field.type);\n  const openPicker = () => {\n    onFocus(field.id);\n    inputRef.current?.click();\n  };\n  const fileName = field.value?.name;\n\n  return (\n    <div style={{ position: \"relative\" }}>\n      <input\n        ref={inputRef}\n        type=\"file\"\n        accept={isImageField ? \"image/*\" : undefined}\n        style={{ display: \"none\" }}\n        onChange={(e) => {\n          const file = e.target.files?.[0];\n          if (file) field.setter({ name: file.name });\n          e.target.value = \"\";\n        }}\n      />\n      <EdsFieldButton\n        value={fileName}\n        placeholder={isImageField ? \"이미지 업로드\" : \"파일 선택\"}\n        active={active}\n        onClick={openPicker}\n        ariaLabel={`${isImageField ? \"이미지\" : \"파일\"} 선택 화면 열기. 현재 선택: ${fileName || \"없음\"}`}\n        prefixIcon={isImageField ? <ImageIcon size={20} /> : <Paperclip size={20} />}\n      />\n    </div>\n  );\n}\n\n/** DIRECT: EDS FIELD_BUTTON/L/Type A 규격을 적용합니다. */\nfunction PanelSignatureField({ field, active, onFocus, onSign }) {\n  const filled = isFilled(field);\n  return (\n    <EdsFieldButton\n      value={filled ? \"서명 완료\" : undefined}\n      placeholder=\"서명하기\"\n      active={active}\n      onClick={() => {\n        onFocus(field.id);\n        onSign?.();\n      }}\n      ariaLabel={`서명 선택 화면 열기. 현재 선택: ${filled ? \"서명 완료\" : \"없음\"}`}\n      prefixIcon={<PenTool size={20} />}\n    />\n  );\n}\n\nfunction PanelField({ field, active, onFocus, onSign }) {\n  const [hovered, setHovered] = useState(false);\n  const filled = isFilled(field);\n  const invalid = isInvalidField(field);\n  const border = invalid\n    ? EDS_COLOR.text.error\n    : filled\n      ? EDS_COLOR.text.success\n      : active\n        ? EDS_COLOR.border.focus\n        : hovered\n          ? EDS_PALETTE.Gray[300]\n          : EDS_COLOR.border.default;\n  const activeShadow = filled ? FIELD_SHADOW.completed : focusShadow;\n  const base = {\n    width: \"100%\",\n    height: 48,\n    borderRadius: RADIUS.scale.lg,\n    border: `${filled ? 2 : 1}px solid ${border}`,\n    outline: active || invalid ? `1px solid ${border}` : \"none\",\n    outlineOffset: 0,\n    background: filled ? FIELD_STATE.completed.bg : EDS_COLOR.background.surface,\n    padding: \"0 16px\",\n    fontSize: 16,\n    color: invalid ? EDS_COLOR.text.error : EDS_COLOR.text.primary,\n    boxShadow: invalid\n      ? \"0 0 0 4px rgba(255,56,60,.12)\"\n      : active\n        ? activeShadow\n        : \"none\",\n  };\n\n  if ([\"text\", \"tel\", \"email\"].includes(field.type)) {\n    return (\n      <>\n        <input\n          type={field.type === \"tel\" ? \"tel\" : field.type}\n          inputMode={field.id === \"phone\" ? \"numeric\" : undefined}\n          value={field.value || \"\"}\n          placeholder=\"\"\n          onFocus={() => onFocus(field.id)}\n          onMouseEnter={() => setHovered(true)}\n          onMouseLeave={() => setHovered(false)}\n          onChange={(e) =>\n            field.setter(\n              field.id === \"phone\"\n                ? formatPhone(e.target.value)\n                : e.target.value,\n            )\n          }\n          style={base}\n        />\n        {invalid && (\n          <p\n            style={{\n              margin: \"6px 2px 0\",\n              color: EDS_COLOR.text.error,\n              fontSize: 14,\n              fontWeight: 800,\n            }}\n          >\n            {field.id === \"phone\"\n              ? \"010-0000-0000 형식으로 입력해 주세요.\"\n              : \"올바른 이메일 형식으로 입력해 주세요.\"}\n          </p>\n        )}\n      </>\n    );\n  }\n  if (field.type === \"date\")\n    return <PanelDateField field={field} active={active} onFocus={onFocus} />;\n  if (field.type === \"dropdown\")\n    return <PanelSelectField field={field} active={active} onFocus={onFocus} />;\n  if ([\"file\", \"image\", \"picture\"].includes(field.type))\n    return <FilePanelField field={field} active={active} onFocus={onFocus} />;\n  if (field.type === \"signature\")\n    return (\n      <PanelSignatureField\n        field={field}\n        active={active}\n        onFocus={onFocus}\n        onSign={onSign}\n      />\n    );\n  return null;\n}\n\n/** DIRECT: EDS BADGE/sm/status 규격을 적용합니다. */\nfunction FieldBadge({ required, completed }) {\n  const label = completed ? \"완료\" : required ? \"필수\" : \"선택\";\n  const tone = completed\n    ? statusBadgeTone.green\n    : required\n      ? statusBadgeTone.red\n      : statusBadgeTone.orange;\n  return (\n    <span\n      style={{\n        ...getBadgeStyle(\"sm\"),\n        background: tone.bg,\n        color: tone.text,\n        flexShrink: 0,\n      }}\n    >\n      {label}\n    </span>\n  );\n}\n\nfunction FieldMeta({ field, active }) {\n  const filled = isFilled(field);\n  const titleColor = active ? EDS_COLOR.border.focus : EDS_COLOR.text.primary;\n  return (\n    <div style={{ display: \"flex\", flexDirection: \"column\", gap: 8 }}>\n      <div\n        style={{\n          display: \"flex\",\n          alignItems: \"center\",\n          justifyContent: \"space-between\",\n          gap: 8,\n        }}\n      >\n        <label\n          style={{\n            display: \"flex\",\n            alignItems: \"center\",\n            gap: 8,\n            fontSize: 16,\n            fontWeight: 800,\n            lineHeight: 1.35,\n            color: titleColor,\n          }}\n        >\n          {active && <Check size={16} color={EDS_COLOR.border.focus} strokeWidth={3} />}\n          {field.label}\n          <FieldBadge required={field.required} completed={filled} />\n        </label>\n        {filled && !active ? (\n          <Check size={18} color={EDS_COLOR.text.success} strokeWidth={3} />\n        ) : (\n          <span style={{ width: 18, height: 18 }} />\n        )}\n      </div>\n      {field.desc && (\n        <p\n          style={{\n            margin: 0,\n            fontSize: 14,\n            lineHeight: 1.55,\n            color: EDS_COLOR.text.secondary,\n          }}\n        >\n          {field.desc}\n        </p>\n      )}\n    </div>\n  );\n}\n\nfunction PanelCard({ children, itemRef, showDivider = true }) {\n  const [hovered, setHovered] = useState(false);\n  return (\n    <div\n      ref={itemRef}\n      onMouseEnter={() => setHovered(true)}\n      onMouseLeave={() => setHovered(false)}\n      style={{\n        display: \"flex\",\n        flexDirection: \"column\",\n        gap: 8,\n        padding: \"16px\",\n        margin: 0,\n        borderRadius: RADIUS.scale.lg,\n        background: EDS_COLOR.background.surface,\n        border: \"none\",\n        position: \"relative\",\n      }}\n    >\n      {children}\n      {showDivider && (\n        <div\n          style={{\n            position: \"absolute\",\n            left: 16,\n            right: 16,\n            bottom: -5,\n            height: 1,\n            background: EDS_COLOR.background.disabled,\n          }}\n        />\n      )}\n    </div>\n  );\n}\n\n/**\n * Service composite, not an official EDS component.\n * Composition: CHECKBOX/LG or RADIO_BUTTON/LG + BADGE/sm.\n * Custom responsibility: group title, selection state, completion logic.\n */\nfunction PanelGroup({\n  item,\n  activeGroup,\n  onFocus,\n  itemRef,\n  showDivider = true,\n}) {\n  const first = item.fields[0];\n  const isCheckbox = first.type === \"checkbox\";\n  const hasValue = item.fields.some(isFilled);\n  const groupActive = activeGroup === item.group;\n  const titleColor = groupActive\n    ? EDS_COLOR.border.focus\n    : EDS_COLOR.text.primary;\n  const locationLabel = isCheckbox\n    ? \"체크박스 위치 보기\"\n    : \"라디오 버튼 위치 보기\";\n\n  return (\n    <div\n      ref={itemRef}\n      style={{\n        display: \"flex\",\n        flexDirection: \"column\",\n        gap: 12,\n        padding: 16,\n        margin: 0,\n        borderRadius: RADIUS.scale.lg,\n        background: EDS_COLOR.background.surface,\n        border: \"none\",\n        position: \"relative\",\n      }}\n    >\n      <div style={{ display: \"flex\", justifyContent: \"space-between\", gap: 8 }}>\n        <div style={{ flex: 1, minWidth: 0 }}>\n          <p\n            style={{\n              display: \"flex\",\n              alignItems: \"center\",\n              gap: 8,\n              margin: 0,\n              fontSize: 16,\n              lineHeight: 1.5,\n              fontWeight: 800,\n              color: titleColor,\n            }}\n          >\n            {groupActive && (\n              <Check\n                size={16}\n                color={EDS_COLOR.border.focus}\n                strokeWidth={3}\n              />\n            )}\n            {isCheckbox ? \"체크박스\" : \"라디오 버튼\"}\n            <FieldBadge required={first.required} completed={hasValue} />\n          </p>\n          <p\n            style={{\n              margin: \"6px 0 0\",\n              fontSize: 14,\n              lineHeight: 1.55,\n              color: EDS_COLOR.text.secondary,\n            }}\n          >\n            {isCheckbox\n              ? \"문서에서 해당하는 항목을 선택해 주세요.\"\n              : item.fields.length > 1\n                ? `${item.fields.length}개 중 하나의 항목을 문서에서 선택해 주세요.`\n                : \"문서에서 해당하는 항목을 선택해 주세요.\"}\n          </p>\n        </div>\n\n        {hasValue && !groupActive ? (\n          <Check size={18} color={EDS_COLOR.text.success} strokeWidth={3} />\n        ) : (\n          <span style={{ width: 18, height: 18 }} />\n        )}\n      </div>\n\n      <EdsFieldButton\n        value={locationLabel}\n        variant=\"typeB\"\n        active={groupActive}\n        onClick={() => onFocus(first.id)}\n        ariaLabel={`${locationLabel}. 문서 위치로 이동`}\n        suffixIcon={<LocateFixed size={20} />}\n      />\n\n      {showDivider && (\n        <div\n          style={{\n            position: \"absolute\",\n            left: 16,\n            right: 16,\n            bottom: -5,\n            height: 1,\n            background: EDS_COLOR.background.disabled,\n          }}\n        />\n      )}\n    </div>\n  );\n}\n\n// ============================================================================\n// 9. DESKTOP PLAYER LAYOUT\n// ============================================================================\n\n/** CUSTOM: 접힌 패널을 다시 펼치는 플로팅 버튼입니다. Figma처럼 버튼형으로 노출합니다. */\nfunction CollapsedPanelButton({ side = \"left\", title, onClick }) {\n  const isLeft = side === \"left\";\n  const panelIcon = isLeft ? (\n    <PanelLeftClose size={20} color={EDS_PALETTE.Gray[500]} />\n  ) : (\n    <PanelRightClose size={20} color={EDS_PALETTE.Gray[500]} />\n  );\n\n  return (\n    <button\n      type=\"button\"\n      onClick={onClick}\n      title={title}\n      style={{\n        height: 56,\n        minWidth: 112,\n        maxWidth: 148,\n        padding: \"0 8px 0 16px\",\n        borderRadius: RADIUS.component.button.XL.value,\n        border: `1px solid ${EDS_COLOR.border.default}`,\n        background: EDS_COLOR.background.surface,\n        boxShadow: \"0 6px 20px rgba(2, 9, 19, 0.12)\",\n        display: \"flex\",\n        alignItems: \"center\",\n        justifyContent: \"space-between\",\n        gap: 12,\n        cursor: \"pointer\",\n      }}\n    >\n      <span\n        style={{\n          minWidth: 0,\n          overflow: \"hidden\",\n          textOverflow: \"ellipsis\",\n          whiteSpace: \"nowrap\",\n          fontSize: 18,\n          fontWeight: 800,\n          color: EDS_COLOR.text.primary,\n          lineHeight: 1.5,\n        }}\n      >\n        {title}\n      </span>\n\n      <div\n        aria-hidden\n        className=\"header-icon-btn\"\n        style={{\n          width: 40,\n          height: 40,\n          flexShrink: 0,\n        }}\n      >\n        {panelIcon}\n      </div>\n    </button>\n  );\n}\n\n/** CUSTOM: EDS 폼 컴포넌트를 내부에 조합한 서비스 전용 우측 입력 패널입니다. */\nfunction RightPanel({\n  fields,\n  activeField,\n  activeGroup,\n  onScrollTo,\n  onSign,\n  filledReq,\n  totalReq,\n  isComplete,\n  onComplete,\n  onToggle,\n}) {\n  const listRef = useRef(null);\n  const itemRefs = useRef({});\n  const setItemRef = (key) => (element) => {\n    if (element) itemRefs.current[key] = element;\n    else delete itemRefs.current[key];\n  };\n\n  useEffect(() => {\n    const key = activeGroup || activeField;\n    const element = key ? itemRefs.current[key] : null;\n    const container = listRef.current;\n    if (!element || !container) return;\n    const elementTop = element.offsetTop;\n    const elementBottom = elementTop + element.offsetHeight;\n    const viewTop = container.scrollTop;\n    const viewBottom = viewTop + container.clientHeight;\n    if (elementTop < viewTop + 12 || elementBottom > viewBottom - 12) {\n      container.scrollTo({\n        top: Math.max(0, elementTop - 12),\n        behavior: \"smooth\",\n      });\n    }\n  }, [activeField, activeGroup]);\n\n  const grouped = useMemo(() => {\n    const result = [];\n    const used = new Set();\n    fields.forEach((field) => {\n      if (field.group) {\n        if (used.has(field.group)) return;\n        used.add(field.group);\n        result.push({\n          type: \"group\",\n          group: field.group,\n          fields: fields.filter((target) => target.group === field.group),\n        });\n      } else {\n        result.push({ type: \"field\", field });\n      }\n    });\n    return result;\n  }, [fields]);\n\n  const progress = totalReq ? Math.round((filledReq / totalReq) * 100) : 0;\n  const remainingReq = Math.max(0, totalReq - filledReq);\n  const nextRequired = getInputUnits(fields).find(\n    (field) => field.required && !isFilled(field),\n  );\n\n  return (\n    <aside\n      {...getEdsProps(\"RightPanel\", { category: \"CUSTOM\" })}\n      style={{\n        width: RIGHT_W,\n        background: EDS_COLOR.background.surface,\n        borderLeft: `1px solid ${EDS_COLOR.border.default}`,\n        display: \"flex\",\n        flexDirection: \"column\",\n        flexShrink: 0,\n      }}\n    >\n      <div\n        style={{\n          height: 56,\n          padding: \"0 16px\",\n          borderBottom: `1px solid ${EDS_COLOR.background.disabled}`,\n          background: EDS_COLOR.background.surface,\n          display: \"flex\",\n          alignItems: \"center\",\n          justifyContent: \"space-between\",\n          flexShrink: 0,\n        }}\n      >\n        <p\n          style={{\n            margin: 0,\n            fontSize: 18,\n            fontWeight: 800,\n            color: EDS_COLOR.text.primary,\n          }}\n        >\n          입력란\n        </p>\n        <button\n          type=\"button\"\n          onClick={onToggle}\n          title=\"입력란 패널 접기\"\n          className=\"header-icon-btn\"\n          style={{ width: 40, height: 40 }}\n        >\n          <PanelRightClose size={20} color={EDS_PALETTE.Gray[500]} />\n        </button>\n      </div>\n      <div\n        ref={listRef}\n        style={{\n          flex: 1,\n          overflowY: \"auto\",\n          padding: \"0 0 12px\",\n          display: \"flex\",\n          flexDirection: \"column\",\n          gap: 8,\n          background: EDS_COLOR.background.surface,\n        }}\n      >\n        {grouped.map((item, index) =>\n          item.type === \"group\" ? (\n            <PanelGroup\n              key={item.group}\n              item={item}\n              activeGroup={activeGroup}\n              itemRef={setItemRef(item.group)}\n              showDivider={index !== grouped.length - 1}\n              onFocus={(id) =>\n                onScrollTo(id, { group: item.group, pulse: true })\n              }\n            />\n          ) : (\n            <PanelCard\n              key={item.field.id}\n              itemRef={setItemRef(item.field.id)}\n              showDivider={index !== grouped.length - 1}\n            >\n              <FieldMeta\n                field={item.field}\n                active={activeField === item.field.id}\n              />\n              <PanelField\n                field={item.field}\n                active={activeField === item.field.id}\n                onFocus={(id) => onScrollTo(id)}\n                onSign={onSign}\n              />\n            </PanelCard>\n          ),\n        )}\n      </div>\n      <div\n        style={{\n          padding: 16,\n          borderTop: `1px solid ${EDS_COLOR.background.disabled}`,\n          background: EDS_COLOR.background.surface,\n          flexShrink: 0,\n        }}\n      >\n        <div\n          style={{\n            display: \"flex\",\n            alignItems: \"center\",\n            justifyContent: \"space-between\",\n            gap: 8,\n          }}\n        >\n          <p\n            style={{\n              margin: 0,\n              fontSize: 14,\n              lineHeight: 1.5,\n              fontWeight: 800,\n              color: EDS_COLOR.text.primary,\n            }}\n          >\n            입력 현황\n          </p>\n          <p\n            style={{\n              margin: 0,\n              fontSize: 14,\n              lineHeight: 1.5,\n              fontWeight: 600,\n              color: isComplete ? EDS_COLOR.text.success : EDS_PALETTE.Gray[500],\n            }}\n          >\n            {isComplete\n              ? \"필수 입력 완료\"\n              : `필수 입력란 ${remainingReq}개 남음`}\n          </p>\n        </div>\n        <div\n          style={{\n            height: 8,\n            marginTop: 8,\n            marginBottom: 8,\n            background: EDS_COLOR.background.disabled,\n            borderRadius: RADIUS.scale.circle,\n            overflow: \"hidden\",\n          }}\n        >\n          <div\n            style={{\n              width: `${progress}%`,\n              height: \"100%\",\n              background: isComplete ? EDS_COLOR.text.success : EDS_COLOR.border.focus,\n              borderRadius: RADIUS.scale.circle,\n              transition: \"width 260ms ease\",\n            }}\n          />\n        </div>\n        <button\n          {...getEdsProps(\"BUTTON\", {\n            category: \"DIRECT\",\n            size: \"XL\",\n            variant: \"primary\",\n            state: isComplete ? \"completed\" : \"enabled\",\n          })}\n          type=\"button\"\n          onClick={\n            isComplete\n              ? onComplete\n              : () => onScrollTo(nextRequired?.id, { pulse: true })\n          }\n          style={{\n            width: \"100%\",\n            ...getButtonStyle(isComplete ? EDS_COLOR.text.success : EDS_COLOR.border.focus, 56),\n            borderRadius: RADIUS.scale.xl,\n          }}\n        >\n          {isComplete ? (\n            <>\n              <Check size={20} strokeWidth={3} /> 서명 완료하기\n            </>\n          ) : (\n            <>\n              다음 필수 항목{\" \"}\n              <span\n                style={{\n                  background: \"rgba(255,255,255,.25)\",\n                  borderRadius: RADIUS.scale.circle,\n                  padding: \"2px 10px\",\n                  fontSize: 13,\n                  fontWeight: 800,\n                }}\n              >\n                {filledReq}/{totalReq}\n              </span>\n              <ChevronRight size={20} strokeWidth={3} />\n            </>\n          )}\n        </button>\n      </div>\n    </aside>\n  );\n}\n\nfunction PageBadges({ stats }) {\n  const req = Math.max(0, stats.requiredRemaining || 0);\n  const opt = Math.max(0, stats.optionalRemaining || 0);\n  if (!req && !opt)\n    return (\n      <div style={{ marginTop: 10, display: \"flex\", justifyContent: \"center\" }}>\n        <span\n          style={{\n            ...getBadgeStyle(\"sm\"),\n            background: statusBadgeTone.green.bg,\n            color: statusBadgeTone.green.text,\n          }}\n        >\n          완료\n        </span>\n      </div>\n    );\n  return (\n    <div\n      style={{\n        marginTop: 10,\n        display: \"flex\",\n        flexDirection: \"column\",\n        gap: 6,\n      }}\n    >\n      {req > 0 && (\n        <div\n          style={{\n            display: \"flex\",\n            justifyContent: \"space-between\",\n            padding: \"7px 8px\",\n            borderRadius: RADIUS.scale.md,\n            background: EDS_PALETTE.Red[50],\n            border: \"1px solid #FFC5C7\",\n          }}\n        >\n          <span\n            style={{\n              ...getBadgeStyle(\"sm\"),\n              background: statusBadgeTone.red.bg,\n              color: statusBadgeTone.red.text,\n            }}\n          >\n            필수\n          </span>\n          <span style={{ fontSize: 14, fontWeight: 800, color: EDS_COLOR.text.error }}>\n            {req}개 남음\n          </span>\n        </div>\n      )}\n      {opt > 0 && (\n        <div\n          style={{\n            display: \"flex\",\n            justifyContent: \"space-between\",\n            padding: \"7px 8px\",\n            borderRadius: RADIUS.scale.md,\n            background: \"#FFF7EB\",\n            border: \"1px solid #FFEED4\",\n          }}\n        >\n          <span\n            style={{\n              ...getBadgeStyle(\"sm\"),\n              background: statusBadgeTone.orange.bg,\n              color: statusBadgeTone.orange.text,\n            }}\n          >\n            선택\n          </span>\n          <span\n            style={{\n              fontSize: 14,\n              fontWeight: 800,\n              color: statusBadgeTone.orange.text,\n            }}\n          >\n            {opt}개 남음\n          </span>\n        </div>\n      )}\n    </div>\n  );\n}\n\n/** CUSTOM: 대응하는 EDS 컴포넌트가 없는 문서 썸네일 내비게이션입니다. */\nfunction LeftSidebar({ activePage, onPageClick, pageStats, onToggle }) {\n  return (\n    <aside\n      {...getEdsProps(\"LeftSidebar\", { category: \"CUSTOM\" })}\n      style={{\n        width: LEFT_W,\n        flexShrink: 0,\n        background: EDS_COLOR.background.surface,\n        borderRight: `1px solid ${EDS_COLOR.border.default}`,\n        display: \"flex\",\n        flexDirection: \"column\",\n        boxSizing: \"border-box\",\n      }}\n    >\n      <div\n        style={{\n          height: 56,\n          padding: \"0 16px\",\n          borderBottom: `1px solid ${EDS_COLOR.background.disabled}`,\n          background: EDS_COLOR.background.surface,\n          display: \"flex\",\n          alignItems: \"center\",\n          justifyContent: \"space-between\",\n          flexShrink: 0,\n        }}\n      >\n        <p\n          style={{\n            margin: 0,\n            fontSize: 18,\n            fontWeight: 800,\n            color: EDS_COLOR.text.primary,\n          }}\n        >\n          페이지\n        </p>\n        <button\n          type=\"button\"\n          onClick={onToggle}\n          title=\"문서 패널 접기\"\n          className=\"header-icon-btn\"\n          style={{ width: 40, height: 40 }}\n        >\n          <PanelLeftClose size={20} color={EDS_PALETTE.Gray[500]} />\n        </button>\n      </div>\n      <div\n        style={{\n          flex: 1,\n          overflowY: \"auto\",\n          scrollbarGutter: \"stable\",\n          padding: \"18px 8px 18px 16px\",\n          display: \"flex\",\n          flexDirection: \"column\",\n          gap: 20,\n          boxSizing: \"border-box\",\n        }}\n      >\n        {[1, 2].map((page) => (\n          <button\n            type=\"button\"\n            key={page}\n            onClick={() => onPageClick(page)}\n            style={{\n              width: \"100%\",\n              boxSizing: \"border-box\",\n              padding: 0,\n              background: \"none\",\n              border: \"none\",\n              cursor: \"pointer\",\n              opacity: activePage === page ? 1 : 0.72,\n              textAlign: \"left\",\n            }}\n          >\n            <div\n              style={{\n                width: \"100%\",\n                boxSizing: \"border-box\",\n                height: 160,\n                background: EDS_COLOR.background.surface,\n                border: `2px solid ${activePage === page ? EDS_COLOR.border.focus : EDS_PALETTE.Gray[300]}`,\n                borderRadius: RADIUS.scale.md,\n                boxShadow:\n                  activePage === page\n                    ? \"0 4px 16px rgba(0,136,255,.15)\"\n                    : \"0 2px 8px rgba(0,0,0,.05)\",\n                display: \"flex\",\n                alignItems: \"center\",\n                justifyContent: \"center\",\n                flexDirection: \"column\",\n                gap: 8,\n              }}\n            >\n              <FileText\n                size={38}\n                color={activePage === page ? EDS_COLOR.border.focus : EDS_PALETTE.Gray[300]}\n                strokeWidth={1.5}\n              />\n              <span\n                style={{\n                  fontSize: 14,\n                  fontWeight: 800,\n                  color: activePage === page ? EDS_COLOR.border.focus : EDS_PALETTE.Gray[500],\n                }}\n              >\n                {page}페이지\n              </span>\n            </div>\n          </button>\n        ))}\n      </div>\n    </aside>\n  );\n}\n\n\n/** DIRECT: EDS MENU의 responsive 규격과 enabled/hover/pressed 상태를 적용합니다. */\nfunction EdsMenuItem({\n  icon,\n  label,\n  onClick,\n  tone = \"neutral\",\n  badge,\n  suffix,\n  size = \"small\",\n  bottomSheet = false,\n}) {\n  const [interactionState, setInteractionState] = useState(\"enabled\");\n  const isMedium = size === \"medium\";\n  const paddingX = 16;\n  const paddingY = isMedium ? 12 : 10;\n  const labelSize = isMedium ? 16 : 14;\n  const gap = isMedium ? 12 : 8;\n  const textColor =\n    tone === \"critical\" ? EDS_COLOR.text.error : EDS_COLOR.text.primary;\n  const stateBackground =\n    interactionState === \"pressed\"\n      ? tone === \"critical\"\n        ? EDS_PALETTE.Opacity.Red[20]\n        : EDS_PALETTE.GreyOpacity[200]\n      : interactionState === \"hover\"\n        ? tone === \"critical\"\n          ? EDS_PALETTE.Opacity.Red[10]\n          : EDS_PALETTE.Gray[100]\n        : \"transparent\";\n\n  return (\n    <button\n      {...getEdsProps(\"MENU.Item\", {\n        size,\n        variant: tone,\n        state: interactionState,\n        category: \"DIRECT\",\n      })}\n      type=\"button\"\n      className=\"eds-menu-item\"\n      onClick={onClick}\n      onMouseEnter={() => setInteractionState(\"hover\")}\n      onMouseLeave={() => setInteractionState(\"enabled\")}\n      onMouseDown={() => setInteractionState(\"pressed\")}\n      onMouseUp={() => setInteractionState(\"hover\")}\n      onTouchStart={() => setInteractionState(\"pressed\")}\n      onTouchEnd={() => setInteractionState(\"enabled\")}\n      onFocus={() => setInteractionState(\"hover\")}\n      onBlur={() => setInteractionState(\"enabled\")}\n      style={{\n        position: \"relative\",\n        width: \"100%\",\n        minHeight: bottomSheet ? 52 : undefined,\n        padding: 0,\n        border: \"none\",\n        background: \"transparent\",\n        color: textColor,\n        cursor: \"pointer\",\n        textAlign: \"left\",\n        display: \"block\",\n      }}\n    >\n      <span\n        aria-hidden=\"true\"\n        className=\"eds-menu-item-bg\"\n        style={{\n          position: \"absolute\",\n          top: 0,\n          bottom: 0,\n          left: 8,\n          right: 8,\n          borderRadius: RADIUS.scale.lg,\n          background: stateBackground,\n        }}\n      />\n      <span\n        style={{\n          position: \"relative\",\n          zIndex: 1,\n          width: \"100%\",\n          minHeight: bottomSheet ? 52 : undefined,\n          padding: `${paddingY}px ${paddingX}px`,\n          display: \"flex\",\n          alignItems: \"center\",\n          gap,\n          boxSizing: \"border-box\",\n        }}\n      >\n        <span\n          aria-hidden=\"true\"\n          style={{\n            width: isMedium ? 20 : 16,\n            height: isMedium ? 20 : 16,\n            flexShrink: 0,\n            display: \"flex\",\n            alignItems: \"center\",\n            justifyContent: \"center\",\n            color:\n              tone === \"critical\"\n                ? EDS_COLOR.text.error\n                : EDS_COLOR.icon.secondary,\n          }}\n        >\n          {icon}\n        </span>\n        <span\n          style={{\n            flex: 1,\n            minWidth: 0,\n            fontSize: labelSize,\n            lineHeight: 1.5,\n            fontWeight: 400,\n            color: textColor,\n          }}\n        >\n          {label}\n        </span>\n        {badge != null && (\n          <span\n            style={{\n              minWidth: 20,\n              height: 20,\n              padding: \"0 6px\",\n              borderRadius: RADIUS.scale.circle,\n              background: EDS_COLOR.text.error,\n              color: EDS_COLOR.background.surface,\n              fontSize: 10,\n              lineHeight: 1,\n              fontWeight: 700,\n              display: \"inline-flex\",\n              alignItems: \"center\",\n              justifyContent: \"center\",\n              flexShrink: 0,\n            }}\n          >\n            {badge}\n          </span>\n        )}\n        {suffix && (\n          <span\n            aria-hidden=\"true\"\n            style={{\n              width: 16,\n              height: 16,\n              flexShrink: 0,\n              display: \"flex\",\n              alignItems: \"center\",\n              justifyContent: \"center\",\n              color: EDS_COLOR.icon.tertiary,\n            }}\n          >\n            {suffix}\n          </span>\n        )}\n      </span>\n    </button>\n  );\n}\n\n/** DIRECT: EDS MENU 그룹 사이 divider입니다. */\nfunction EdsMenuDivider({ bottomSheet = false }) {\n  return (\n    <div\n      {...getEdsProps(\"MENU.Divider\", { category: \"DIRECT\" })}\n      aria-hidden=\"true\"\n      style={{\n        height: 1,\n        margin: \"4px 16px\",\n        background: EDS_COLOR.background.disabled,\n        flexShrink: 0,\n      }}\n    />\n  );\n}\n\nfunction Header({\n  isSaved,\n  onSave,\n  onHelp,\n  onMessages,\n  onAttachments,\n  showMore,\n  setShowMore,\n  isMobile,\n  isCompact,\n  onInfo,\n  onReject,\n  onMore,\n}) {\n  const HeaderIcon = ({ icon, onClick, badge, title }) => (\n    <button\n      type=\"button\"\n      className=\"header-icon-btn\"\n      onClick={onClick}\n      title={title}\n    >\n      {icon}\n      {badge != null && (\n        <span\n          style={{\n            position: \"absolute\",\n            top: 2,\n            right: 2,\n            minWidth: 20,\n            height: 20,\n            borderRadius: RADIUS.scale.circle,\n            background: EDS_COLOR.text.error,\n            color: EDS_COLOR.background.surface,\n            fontSize: 10,\n            fontWeight: 800,\n            display: \"flex\",\n            alignItems: \"center\",\n            justifyContent: \"center\",\n            padding: \"0 5px\",\n          }}\n        >\n          {badge}\n        </span>\n      )}\n    </button>\n  );\n\n  if (isCompact) {\n    return (\n      <header\n        style={{\n          height: isMobile ? HEADER_MOBILE : HEADER_PC,\n          background: EDS_COLOR.background.surface,\n          borderBottom: `1px solid ${EDS_COLOR.border.default}`,\n          display: \"flex\",\n          alignItems: \"center\",\n          gap: 8,\n          padding: \"0 12px\",\n          flexShrink: 0,\n          zIndex: 50,\n        }}\n      >\n        <div style={{ flex: 1, minWidth: 0 }}>\n          <p\n            style={{\n              margin: 0,\n              fontSize: isMobile ? 16 : 17,\n              fontWeight: 800,\n              overflow: \"hidden\",\n              textOverflow: \"ellipsis\",\n              whiteSpace: \"nowrap\",\n            }}\n          >\n            개인정보 이용·제공·활용 동의서\n          </p>\n        </div>\n        <button\n          type=\"button\"\n          onClick={onSave}\n          title=\"임시저장\"\n          style={{\n            height: 36,\n            padding: isMobile ? \"0 10px\" : \"0 12px\",\n            display: \"flex\",\n            alignItems: \"center\",\n            gap: 5,\n            border: `1px solid ${isSaved ? \"#C1E9CA\" : EDS_COLOR.border.default}`,\n            borderRadius: RADIUS.scale.md,\n            background: isSaved ? \"#E8F9EE\" : EDS_COLOR.background.surface,\n            color: isSaved ? EDS_COLOR.text.success : EDS_PALETTE.Gray[700],\n            cursor: \"pointer\",\n            fontSize: 14,\n            fontWeight: 800,\n            flexShrink: 0,\n          }}\n        >\n          {isSaved ? <Check size={14} strokeWidth={3} /> : <Save size={14} />}\n          {isSaved ? \"저장됨\" : \"임시저장\"}\n        </button>\n        <HeaderIcon\n          icon={<HelpCircle size={20} color={EDS_PALETTE.Gray[700]} />}\n          onClick={onHelp}\n          title=\"도움말\"\n        />\n        <HeaderIcon\n          icon={<MoreHorizontal size={20} color={EDS_PALETTE.Gray[700]} />}\n          onClick={onMore}\n          title=\"더보기\"\n        />\n      </header>\n    );\n  }\n\n  return (\n    <header\n      style={{\n        position: \"relative\",\n        height: HEADER_PC,\n        background: EDS_COLOR.background.surface,\n        borderBottom: `1px solid ${EDS_COLOR.border.default}`,\n        display: \"flex\",\n        alignItems: \"center\",\n        padding: \"0 20px\",\n        gap: 16,\n        flexShrink: 0,\n        zIndex: 50,\n      }}\n    >\n      <div\n        style={{\n          display: \"flex\",\n          alignItems: \"center\",\n          gap: 10,\n          flex: 1,\n          minWidth: 0,\n        }}\n      >\n        <div style={{ minWidth: 0 }}>\n          <p\n            style={{\n              margin: 0,\n              fontSize: 17,\n              fontWeight: 800,\n              overflow: \"hidden\",\n              textOverflow: \"ellipsis\",\n              whiteSpace: \"nowrap\",\n            }}\n          >\n            개인정보 이용·제공·활용 동의서\n          </p>\n          <p style={{ margin: \"4px 0 0\", fontSize: 14, color: EDS_COLOR.text.secondary }}>\n            요청자: 김담당(HR팀) · 수신인: 홍길동 · 작성 기한: 2026.05.27 23:59\n            까지\n          </p>\n        </div>\n      </div>\n      <button\n        type=\"button\"\n        onClick={onSave}\n        style={{\n          height: 40,\n          padding: \"0 16px\",\n          display: \"flex\",\n          alignItems: \"center\",\n          gap: 6,\n          border: `1px solid ${isSaved ? \"#C1E9CA\" : EDS_COLOR.border.default}`,\n          borderRadius: RADIUS.scale.md,\n          background: isSaved ? \"#E8F9EE\" : EDS_COLOR.background.surface,\n          color: isSaved ? EDS_COLOR.text.success : EDS_PALETTE.Gray[700],\n          cursor: \"pointer\",\n          fontWeight: 700,\n        }}\n      >\n        {isSaved ? (\n          <>\n            <Check size={16} strokeWidth={3} /> 임시저장 완료\n          </>\n        ) : (\n          <>\n            <Save size={16} /> 임시저장\n          </>\n        )}\n      </button>\n      <HeaderIcon\n        icon={<HelpCircle size={20} color={EDS_PALETTE.Gray[700]} />}\n        onClick={onHelp}\n        title=\"도움말\"\n      />\n      <HeaderIcon\n        icon={<MessageSquare size={20} color={EDS_PALETTE.Gray[700]} />}\n        onClick={onMessages}\n        badge={3}\n        title=\"메시지\"\n      />\n      <HeaderIcon\n        icon={<Paperclip size={20} color={EDS_PALETTE.Gray[700]} />}\n        onClick={onAttachments}\n        badge={3}\n        title=\"첨부파일\"\n      />\n      <HeaderIcon\n        icon={<Download size={20} color={EDS_PALETTE.Gray[700]} />}\n        onClick={() => {}}\n        title=\"다운로드\"\n      />\n      <div style={{ position: \"relative\" }}>\n        <HeaderIcon\n          icon={<MoreHorizontal size={20} color={EDS_PALETTE.Gray[700]} />}\n          onClick={() => setShowMore((v) => !v)}\n          title=\"더보기\"\n        />\n        {showMore && (\n          <>\n            <div\n              style={{ position: \"fixed\", inset: 0, zIndex: 100 }}\n              onClick={() => setShowMore(false)}\n            />\n            <div\n              {...getEdsProps(\"MENU.Content\", {\n                size: \"medium\",\n                category: \"DIRECT\",\n              })}\n              className=\"anim-su\"\n              style={{\n                position: \"absolute\",\n                top: \"100%\",\n                right: 0,\n                marginTop: 8,\n                width: 240,\n                maxHeight: 480,\n                overflowY: \"auto\",\n                background: EDS_COLOR.background.surface,\n                borderRadius: RADIUS.scale.xl,\n                boxShadow: \"0 4px 16px rgba(0,0,0,.12)\",\n                border: `1px solid ${EDS_COLOR.border.default}`,\n                padding: \"8px 0\",\n                zIndex: 101,\n              }}\n            >\n              <div {...getEdsProps(\"MENU.Group\", { category: \"DIRECT\" })}>\n                <EdsMenuItem\n                  size=\"medium\"\n                  icon={<MessageSquare size={20} />}\n                  label=\"메시지\"\n                  badge={3}\n                  onClick={() => {\n                    setShowMore(false);\n                    onMessages();\n                  }}\n                />\n                <EdsMenuItem\n                  size=\"medium\"\n                  icon={<Paperclip size={20} />}\n                  label=\"첨부파일\"\n                  badge={3}\n                  onClick={() => {\n                    setShowMore(false);\n                    onAttachments();\n                  }}\n                />\n                <EdsMenuItem\n                  size=\"medium\"\n                  icon={<Download size={20} />}\n                  label=\"문서 다운로드\"\n                  onClick={() => setShowMore(false)}\n                />\n              </div>\n\n              <EdsMenuDivider />\n\n              <div {...getEdsProps(\"MENU.Group\", { category: \"DIRECT\" })}>\n                <EdsMenuItem\n                  size=\"medium\"\n                  icon={<FileText size={20} />}\n                  label=\"문서 정보\"\n                  onClick={() => {\n                    setShowMore(false);\n                    onInfo();\n                  }}\n                />\n              </div>\n\n              <EdsMenuDivider />\n\n              <div {...getEdsProps(\"MENU.Group\", { category: \"DIRECT\" })}>\n                <EdsMenuItem\n                  size=\"medium\"\n                  icon={<LifeBuoy size={20} />}\n                  label=\"지원 및 고객센터\"\n                  onClick={() => setShowMore(false)}\n                />\n                <EdsMenuItem\n                  size=\"medium\"\n                  icon={<Globe2 size={20} />}\n                  label=\"이싸인온 홈페이지\"\n                  onClick={() => setShowMore(false)}\n                />\n              </div>\n\n              <EdsMenuDivider />\n\n              <div {...getEdsProps(\"MENU.Group\", { category: \"DIRECT\" })}>\n                <EdsMenuItem\n                  size=\"medium\"\n                  tone=\"critical\"\n                  icon={<AlertTriangle size={20} />}\n                  label=\"문서 반려하기\"\n                  onClick={() => {\n                    setShowMore(false);\n                    onReject();\n                  }}\n                />\n              </div>\n            </div>\n          </>\n        )}\n      </div>\n    </header>\n  );\n}\n\n// ============================================================================\n// 10. MOBILE INPUT BOTTOM SHEETS\n// ============================================================================\n\nfunction BottomSheetNav({\n  required,\n  hasValue,\n  valid = true,\n  onPrev,\n  onNext,\n  isLast = false,\n  nextLabel,\n  allowLocationPreview = false,\n}) {\n  const hasRequiredValue = required ? hasValue : true;\n  const canGoNext = valid && hasRequiredValue;\n  const label = nextLabel || (isLast ? \"완료\" : \"다음\");\n  const primaryEnabled = canGoNext || allowLocationPreview;\n\n  return (\n    <BottomSheetButtonArea>\n      <div\n        {...getEdsProps(\"BOTTOM_SHEET.CTA\", {\n          category: \"DIRECT\",\n          variant: \"double\",\n        })}\n        style={{\n          display: \"grid\",\n          gridTemplateColumns: \"repeat(2, minmax(0, 1fr))\",\n          gap: 8,\n          alignItems: \"center\",\n        }}\n      >\n        <button\n          {...getEdsProps(\"BUTTON\", {\n            size: \"XL\",\n            variant: \"secondaryGray\",\n            category: \"DIRECT\",\n          })}\n          className=\"eds-secondary-gray-btn\"\n          type=\"button\"\n          disabled={!onPrev}\n          onClick={onPrev || undefined}\n          style={{\n            ...getSecondaryGrayButtonStyle({\n              height: 56,\n              enabled: Boolean(onPrev),\n            }),\n          }}\n        >\n          이전\n        </button>\n\n        <button\n          {...getEdsProps(\"BUTTON\", {\n            size: \"XL\",\n            variant: primaryEnabled ? \"primary\" : \"secondaryGray\",\n            category: \"DIRECT\",\n          })}\n          type=\"button\"\n          disabled={!primaryEnabled}\n          onClick={primaryEnabled ? onNext : undefined}\n          style={{\n            width: \"100%\",\n            height: 56,\n            borderRadius: RADIUS.component.button.XL.value,\n            border: \"none\",\n            background: allowLocationPreview && !hasValue\n              ? EDS_COLOR.background.disabled\n              : primaryEnabled\n                ? EDS_COLOR.border.focus\n                : EDS_COLOR.background.disabled,\n            color: allowLocationPreview && !hasValue\n              ? EDS_COLOR.text.primary\n              : primaryEnabled\n                ? EDS_COLOR.background.surface\n                : EDS_COLOR.text.tertiary,\n            fontSize: 16,\n            fontWeight: 600,\n            cursor: primaryEnabled ? \"pointer\" : \"default\",\n          }}\n        >\n          {label}\n        </button>\n      </div>\n    </BottomSheetButtonArea>\n  );\n}\n\n/**\n * 모바일 바텀시트 본문에 직접 노출되는 날짜·시간 선택 UI입니다.\n * 제품 코드에서는 MUI X Date Pickers의 DateCalendar + TimeField 조합으로\n * 교체할 수 있도록 값 인터페이스를 datetime-local 형식으로 유지합니다.\n */\nfunction MuiDateTimePickerBody({ value, onChange }) {\n  const now = new Date();\n  const parsed = value ? new Date(String(value).replace(\" \", \"T\")) : now;\n  const safeDate = Number.isNaN(parsed.getTime()) ? now : parsed;\n  const [viewDate, setViewDate] = useState(\n    new Date(safeDate.getFullYear(), safeDate.getMonth(), 1),\n  );\n\n  useEffect(() => {\n    const next = value ? new Date(String(value).replace(\" \", \"T\")) : null;\n    if (next && !Number.isNaN(next.getTime())) {\n      setViewDate(new Date(next.getFullYear(), next.getMonth(), 1));\n    }\n  }, [value]);\n\n  const selected = value ? new Date(String(value).replace(\" \", \"T\")) : null;\n  const year = viewDate.getFullYear();\n  const month = viewDate.getMonth();\n  const firstDay = new Date(year, month, 1).getDay();\n  const lastDate = new Date(year, month + 1, 0).getDate();\n  const cells = Array.from({ length: 42 }, (_, index) => {\n    const day = index - firstDay + 1;\n    return day >= 1 && day <= lastDate ? day : null;\n  });\n\n  const emit = ({ day, hour, minute }) => {\n    const base =\n      selected && !Number.isNaN(selected.getTime())\n        ? new Date(selected)\n        : new Date(year, month, day || 1, 9, 0);\n    base.setFullYear(year);\n    base.setMonth(month);\n    if (day) base.setDate(day);\n    if (hour !== undefined) base.setHours(hour);\n    if (minute !== undefined) base.setMinutes(minute);\n    const pad = (number) => String(number).padStart(2, \"0\");\n    onChange(\n      `${base.getFullYear()}-${pad(base.getMonth() + 1)}-${pad(\n        base.getDate(),\n      )} ${pad(base.getHours())}:${pad(base.getMinutes())}`,\n    );\n  };\n\n  const selectedDay =\n    selected &&\n    selected.getFullYear() === year &&\n    selected.getMonth() === month\n      ? selected.getDate()\n      : null;\n  const hour = selected ? selected.getHours() : 9;\n  const minute = selected ? selected.getMinutes() : 0;\n\n  return (\n    <div\n      {...getEdsProps(\"MUI.DateTimePicker.Body\", {\n        category: \"COMPOSITE\",\n      })}\n      style={{\n        border: `1px solid ${EDS_COLOR.border.default}`,\n        borderRadius: RADIUS.scale.lg,\n        background: EDS_COLOR.background.surface,\n        overflow: \"hidden\",\n      }}\n    >\n      <div\n        style={{\n          height: 52,\n          padding: \"0 12px\",\n          display: \"flex\",\n          alignItems: \"center\",\n          justifyContent: \"space-between\",\n          borderBottom: `1px solid ${EDS_COLOR.background.disabled}`,\n        }}\n      >\n        <button\n          type=\"button\"\n          aria-label=\"이전 달\"\n          onClick={() => setViewDate(new Date(year, month - 1, 1))}\n          className=\"header-icon-btn\"\n          style={{ width: 40, height: 40 }}\n        >\n          <ChevronLeft size={20} />\n        </button>\n        <strong style={{ fontSize: 16, color: EDS_COLOR.text.primary }}>\n          {year}년 {month + 1}월\n        </strong>\n        <button\n          type=\"button\"\n          aria-label=\"다음 달\"\n          onClick={() => setViewDate(new Date(year, month + 1, 1))}\n          className=\"header-icon-btn\"\n          style={{ width: 40, height: 40 }}\n        >\n          <ChevronRight size={20} />\n        </button>\n      </div>\n\n      <div style={{ padding: \"12px 12px 8px\" }}>\n        <div\n          style={{\n            display: \"grid\",\n            gridTemplateColumns: \"repeat(7, 1fr)\",\n            marginBottom: 4,\n          }}\n        >\n          {[\"일\", \"월\", \"화\", \"수\", \"목\", \"금\", \"토\"].map((label) => (\n            <div\n              key={label}\n              style={{\n                height: 28,\n                display: \"flex\",\n                alignItems: \"center\",\n                justifyContent: \"center\",\n                fontSize: 12,\n                color: EDS_COLOR.text.secondary,\n              }}\n            >\n              {label}\n            </div>\n          ))}\n        </div>\n        <div\n          style={{\n            display: \"grid\",\n            gridTemplateColumns: \"repeat(7, 1fr)\",\n            rowGap: 4,\n          }}\n        >\n          {cells.map((day, index) => {\n            const active = day === selectedDay;\n            return (\n              <button\n                key={index}\n                type=\"button\"\n                disabled={!day}\n                onClick={() => day && emit({ day })}\n                style={{\n                  height: 36,\n                  border: \"none\",\n                  borderRadius: RADIUS.scale.circle,\n                  background: active\n                    ? EDS_COLOR.border.focus\n                    : \"transparent\",\n                  color: active\n                    ? EDS_COLOR.background.surface\n                    : day\n                      ? EDS_COLOR.text.primary\n                      : \"transparent\",\n                  fontSize: 14,\n                  fontWeight: active ? 700 : 400,\n                  cursor: day ? \"pointer\" : \"default\",\n                }}\n              >\n                {day || \"\"}\n              </button>\n            );\n          })}\n        </div>\n      </div>\n\n      <div\n        style={{\n          padding: \"12px 16px 16px\",\n          borderTop: `1px solid ${EDS_COLOR.background.disabled}`,\n          display: \"grid\",\n          gridTemplateColumns: \"1fr auto 1fr\",\n          alignItems: \"center\",\n          gap: 8,\n        }}\n      >\n        <input\n          aria-label=\"시\"\n          type=\"number\"\n          min=\"0\"\n          max=\"23\"\n          value={hour}\n          onChange={(event) =>\n            emit({\n              hour: Math.min(23, Math.max(0, Number(event.target.value))),\n            })\n          }\n          style={{\n            width: \"100%\",\n            height: 48,\n            boxSizing: \"border-box\",\n            borderRadius: RADIUS.component.input.value,\n            border: `1px solid ${EDS_COLOR.border.default}`,\n            padding: \"0 16px\",\n            textAlign: \"center\",\n            fontSize: 16,\n          }}\n        />\n        <span style={{ fontSize: 18, fontWeight: 700 }}>:</span>\n        <input\n          aria-label=\"분\"\n          type=\"number\"\n          min=\"0\"\n          max=\"59\"\n          step=\"5\"\n          value={minute}\n          onChange={(event) =>\n            emit({\n              minute: Math.min(59, Math.max(0, Number(event.target.value))),\n            })\n          }\n          style={{\n            width: \"100%\",\n            height: 48,\n            boxSizing: \"border-box\",\n            borderRadius: RADIUS.component.input.value,\n            border: `1px solid ${EDS_COLOR.border.default}`,\n            padding: \"0 16px\",\n            textAlign: \"center\",\n            fontSize: 16,\n          }}\n        />\n      </div>\n    </div>\n  );\n}\n\nfunction FieldSheet({\n  fields,\n  activeId,\n  onClose,\n  onSave,\n  onSign,\n  onOpenGroup,\n  onScrollTo,\n}) {\n  const index = fields.findIndex((field) => field.id === activeId);\n  const field = fields[index];\n  const [draft, setDraft] = useState(field?.value ?? \"\");\n  const [selectDepth, setSelectDepth] = useState(false);\n  const [inputFocused, setInputFocused] = useState(false);\n  const inputRef = useRef(null);\n\n  useEffect(() => {\n    setDraft(field?.value ?? \"\");\n    setSelectDepth(false);\n    setInputFocused(false);\n    const timer = window.setTimeout(() => inputRef.current?.focus?.(), 80);\n    return () => window.clearTimeout(timer);\n  }, [activeId]);\n\n  useEffect(() => {\n    if (!field) return;\n    // activeId가 바뀌는 순간 이전 필드의 draft가 새 필드에 저장되지 않도록\n    // 저장 effect는 draft 변경에만 반응합니다.\n    // 새 필드 값은 위 effect의 setDraft 이후 정상적으로 동기화됩니다.\n    onSave(field.id, draft);\n  }, [draft]);\n\n  if (!field) return null;\n\n  const validPhone = field.id !== \"phone\" || !draft || isValidPhone(draft);\n  const validEmail = field.id !== \"email\" || !draft || isValidEmail(draft);\n  const valid = validPhone && validEmail;\n  const hasTextValue =\n    [\"text\", \"tel\", \"email\"].includes(field.type) &&\n    String(draft || \"\").trim().length > 0;\n  const textFieldCompleted = valid && hasTextValue;\n  const textFieldState = !valid\n    ? \"error\"\n    : textFieldCompleted\n      ? inputFocused\n        ? \"completed-focus\"\n        : \"completed\"\n      : inputFocused\n        ? \"focus\"\n        : \"default\";\n  const textFieldBorderColor = !valid\n    ? EDS_COLOR.text.error\n    : textFieldCompleted\n      ? EDS_COLOR.text.success\n      : inputFocused\n        ? EDS_COLOR.border.focus\n        : EDS_COLOR.border.default;\n  const textFieldBorderWidth = textFieldCompleted ? 2 : 1;\n  const textFieldBackground = textFieldCompleted\n    ? FIELD_STATE.completed.bg\n    : EDS_COLOR.background.surface;\n  const textFieldShadow = !valid\n    ? \"0 0 0 4px rgba(255,56,60,.12)\"\n    : inputFocused\n      ? textFieldCompleted\n        ? FIELD_SHADOW.completed\n        : focusShadow\n      : \"none\";\n  // 바텀시트의 이전·다음 순차 이동은 필수 입력 항목만 대상으로 합니다.\n  // 이메일 같은 선택 입력 항목은 직접 선택했을 때만 열리며,\n  // \"다음\" 버튼의 자동 진행 흐름에는 포함하지 않습니다.\n  const isRequiredNavigationField = (item) =>\n    item.type !== \"readonly\" && item.required !== false;\n  const previousField =\n    [...fields.slice(0, index)]\n      .reverse()\n      .find(isRequiredNavigationField) || null;\n  const nextField =\n    fields\n      .slice(index + 1)\n      .find(isRequiredNavigationField) || null;\n\n  const saveAndGo = (target) => {\n    // 현재 필드를 먼저 확정 저장한 뒤 다음 필드 전환을 별도 프레임에서 처리합니다.\n    // 파일처럼 object 값을 사용하는 필드가 다음 text/date 필드의 draft로\n    // 일시적으로 전달되는 것을 방지합니다.\n    onSave(field.id, draft);\n\n    if (!target) {\n      onClose();\n      return;\n    }\n\n    const openTarget = () => {\n      onScrollTo?.(target.id);\n\n      if (target.group) {\n        onClose();\n        window.setTimeout(() => onOpenGroup(target.group), 200);\n        return;\n      }\n\n      if (target.id === \"sign\") {\n        onClose();\n        window.setTimeout(onSign, 200);\n        return;\n      }\n\n      onClose(target.id);\n    };\n\n    window.requestAnimationFrame(openTarget);\n  };\n\n  const closeWithSave = () => {\n    onSave(field.id, draft);\n    onClose();\n  };\n\n  if (field.type === \"dropdown\" && selectDepth) {\n    return (\n      <Overlay\n        dim={false}\n        onClose={closeWithSave}\n        align=\"flex-end\"\n        zIndex={250}\n      >\n        <Sheet>\n          <BottomSheetHeader\n            title={field.label}\n            subtitle=\"옵션을 선택해 주세요.\"\n            onBack={() => setSelectDepth(false)}\n            onClose={closeWithSave}\n          />\n          <BottomSheetBody variant=\"itemList\">\n            <div\n              {...getEdsProps(\"SELECT.dropdownItem\", {\n                size: \"L\",\n                category: \"DIRECT\",\n              })}\n              role=\"listbox\"\n              style={{ display: \"flex\", flexDirection: \"column\", gap: 4 }}\n            >\n              {(field.options || []).map((option) => {\n                const selected = draft === option;\n                return (\n                  <button\n                    key={option}\n                    type=\"button\"\n                    role=\"option\"\n                    aria-selected={selected}\n                    onClick={() => {\n                      setDraft(option);\n                      setSelectDepth(false);\n                    }}\n                    style={{\n                      width: \"100%\",\n                      height: 52,\n                      boxSizing: \"border-box\",\n                      border: \"none\",\n                      borderRadius: RADIUS.scale.md,\n                      background: EDS_COLOR.background.surface,\n                      color: EDS_COLOR.text.primary,\n                      display: \"flex\",\n                      alignItems: \"center\",\n                      gap: 10,\n                      padding: \"0 16px\",\n                      cursor: \"pointer\",\n                      textAlign: \"left\",\n                    }}\n                  >\n                    <span\n                      style={{\n                        flex: 1,\n                        minWidth: 0,\n                        fontSize: 16,\n                        lineHeight: 1.5,\n                        fontWeight: selected ? 700 : 400,\n                      }}\n                    >\n                      {option}\n                    </span>\n <TextFieldMessage>\n                    010-0000-0000 형식으로 입력해주세요.\n                  </TextFieldMessage>\n                </div>\n              )}\n\n              {field.id === \"email\" && draft && !validEmail && (\n                <div id={`${field.id}-field-error`}>\n                  <TextFieldMessage>\n                    올바른 이메일 형식을 입력해주세요.\n                  </TextFieldMessage>\n                </div>\n              )}\n            </TextFieldStack>\n          )}\n          {field.type === \"date\" && (\n            <div\n              {...getEdsProps(\"MUI.DateTimePicker\", {\n                category: \"COMPOSITE\",\n                state: draft ? \"completed\" : \"default\",\n              })}\n              style={{\n                display: \"flex\",\n                flexDirection: \"column\",\n                gap: 12,\n              }}\n            >\n              <MuiDateTimePickerBody\n                value={draft}\n                onChange={(nextValue) => {\n                  setDraft(nextValue);\n                }}\n              />\n\n              {draft && (\n                <div\n                  role=\"status\"\n                  style={{\n                    minHeight: 48,\n                    borderRadius: RADIUS.scale.lg,\n                    background: FIELD_STATE.completed.bg,\n                    border: `1px solid ${FIELD_STATE.completed.border}`,\n                    padding: \"10px 14px\",\n                    display: \"flex\",\n                    alignItems: \"center\",\n                    gap: 10,\n                    color: EDS_COLOR.text.primary,\n                  }}\n                >\n                  <Check\n                    size={20}\n                    color={EDS_COLOR.text.success}\n                    strokeWidth={3}\n                  />\n                  <div style={{ minWidth: 0 }}>\n                    <p\n                      style={{\n                        margin: 0,\n                        fontSize: n  group,\n  onClose,\n  onOpenGroup,\n  onSign,\n  onScrollTo,\n}) {\n  const groupFields = fields.filter((field) => field.group === group);\n  const first = groupFields[0];\n\n  if (!first) return null;\n\n  const startIndex = fields.findIndex((field) => field.group === group);\n  const endIndex = fields.reduce(\n    (last, field, index) => (field.group === group ? index : last),\n    startIndex,\n  );\n\n  const previous =\n    [...fields.slice(0, startIndex)]\n      .reverse()\n      .find((field) => field.type !== \"readonly\") || null;\n  const next =\n    fields.slice(endIndex + 1).find((field) => field.type !== \"readonly\") ||\n    null;\n\n  const isRadio = first.type === \"radio\";\n  const title = isRadio ? \"라디오 버튼\" : \"체크박스\";\n  const subtitle = isRadio\n    ? groupFields.length > 1\n      ? `${groupFields.length}개 중 하나의 항목을 선택해 주세요.`\n      : \"해당하는 항목을 선택해 주세요.\"\n    : \"해당하는 항목을 선택해 주세요.\";\n  const locationButtonLabel = isRadio\n    ? \"라디오 버튼 위치 보기\"\n    : \"체크박스 위치 보기\";\n  const [documentInteraction, setDocumentInteraction] = useState(false);\n  const selected = isRadio\n    ? Boolean(first.value)\n    : Array.isArray(first.value) && first.value.length > 0;\n\n  const go = (target) => {\n    if (!target) return onClose();\n\n    onScrollTo?.(target.id);\n\n    if (target.group && target.group !== group) {\n      onClose();\n      window.setTimeout(() => onOpenGroup(target.group), 200);\n      return;\n    }\n\n    if (target.id === \"sign\") {\n      onClose();\n      window.setTimeout(onSign, 200);\n      return;\n    }\n\n    onClose(target.id);\n  };\n\n  const previewLocation = () => {\n    // 바텀시트를 유지한 채 문서 위치로 이동하고 pulse 효과를 표시합니다.\n    // 이후 문서 배경의 체크박스·라디오를 직접 선택할 수 있도록\n    // 오버레이의 포인터 차단을 해제합니다.\n    setDocumentInteraction(true);\n    onScrollTo?.(first.id, undefined, { pulse: true });\n  };\n\n  const handlePrimary = () => {\n    if (!selected) {\n      previewLocation();\n      return;\n    }\n    go(next);\n  };\n\n  return (\n n            />\n          </div>\n        </BottomSheetBody>\n      </Sheet>\n    </Overlay>\n  );\n}\n\n\nfunction CompletionTypeSegment({ value, onChange }) {\n  const options = [\n    { key: \"handoff\", label: \"다음 수신인\" },\n    { key: \"complete\", label: \"최종 완료\" },\n  ];\n\n  return (\n    <div\n      {...getEdsProps(\"SEGMENTED_CONTROL\", {\n        category: \"COMPOSITE\",\n        size: \"sm\",\n        variant: \"compact\",\n      })}\n      style={{\n        display: \"inline-flex\",\n        alignItems: \"center\",\n        gap: 4,\n        padding: 4,\n        borderRadius: 999,\n        background: EDS_COLOR.background.base,\n        border: `1px solid ${EDS_COLOR.border.default}`,\n      }}\n    >\n      {options.map((option) => {\n        const selected = value === option.key;\n        return (\n          <button\n            key={option.key}\n            type=\"button\"\n            onClick={() => onChange(option.key)}\n            style={{\n              border: \"none\",\n              borderRadius: 999,\n              height: 28,\n              padding: \"0 10px\",\n              background: selected\n                ? EDS_COLOR.background.surface\n                : \"transparent\",\n              color: selected\n                ? EDS_COLOR.text.primary\n                : EDS_COLOR.text.secondary,\n              fontSize: 12,\n              fontWeight: 700,\n              cursor: \"pointer\",\n              boxShadow: selected ? \"0 1px 2px rgba(0,0,0,.08)\" : \"none\",\n            }}\n          >\n            {option.label}\n          </button>\n        );\n      })}\n    </div>\n  );\n}\n\nfunction CompletionSequencePanel({ mode, isCompact = false }) {\n  const steps =\n    mode === \"handoff\"\n      ? [\n          { name: \"김이름\", sub: \"tim.jennings@example.com\", status: \"done\" },\n          { name: \"나\", sub: \"\", status: \"current\" },\n          { name: \"김싸인\", sub: \"example@example.com\", status: \"upcoming\" },\n          {     >\n      <div\n        style={{\n          display: \"flex\",\n          alignItems: \"center\",\n          gap: 6,\n          fontSize: 14,\n          lineHeight: 1.5,\n          fontWeight: 700,\n        }}\n      >\n        <span style={{ color: EDS_COLOR.text.primary }}>\n          내 서명을 기다리는 문서\n        </span>\n        <span style={{ color: EDS_COLOR.text.link }}>10</span>\n      </div>\n\n      <div\n        style={{\n          borderRadius: 12,\n          border: `1px solid ${EDS_COLOR.border.default}`,\n          background: EDS_COLOR.background.surface,\n          padding: isCompact ? \"16px\" : \"18px 22px\",\n          display: \"flex\",\n          alignItems: isCompact ? \"flex-start\" : \"center\",\n          justifyContent: \"space-between\",\n          flexDirection: isCompact ? \"column\" : \"row\",\n          gap: isCompact ? 6 : 16,\n        }}\n      >\n        <span\n          style={{\n            color: EDS_COLOR.text.secondary,\n            fontSize: 14,\n            lineHeight: 1.5,\n            fontWeight: 500,\n          }}\n        >\n          다음 문서\n        </span>\n        <span\n          style={{\n            color: EDS_COLOR.text.primary,\n            fontSize: 14,\n            lineHeight: 1.5,\n            fontWeight: 700,\n            textAlign: isCompact ? \"left\" : \"right\",\n            wordBreak: \"break-word\",\n          }}\n        >\n          근로계약서_김싸인\n        </span>\n      </div>\n    </div>\n  );\n}\n\nfunction CompletionStatusIcon({ mode }) {\n  const handoff = mode === \"handoff\";\n  const accentColor = handoff\n    ? EDS_PALETTE.Yellow[500]\n    : EDS_PALETTE.Blue[500];\n\n  return (\n    <div\n      {...getEdsProps(\"COMPLETION_STATUS_ICON\", {\n        category: \"CUSTOM\",\n        state: mode,\n      })}\n      data-eds-slot=\"icon\"\n      style={{\n        width: 48,\n        height: 48,\n        borderRadius: 999,\n        border: handoff\n          ? `4px dashed ${accentColor}`\n          : `4px soli           lineHeight: 1.5,\n                fontWeight: 700,\n              }}\n            >\n              반려가 완료되었습니다.\n            </h2>\n\n            <p\n              id=\"result-modal-subtitle-rejected\"\n              style={{\n                margin: 0,\n                color: EDS_COLOR.text.secondary,\n                fontSize: 16,\n                lineHeight: 1.5,\n                fontWeight: 400,\n                wordBreak: \"keep-all\",\n              }}\n            >\n              반려 사유가 {rejectRecipientLabel}에게 전달되었어요.\n            </p>\n          </div>\n\n          <button\n            {...getEdsProps(\"BUTTON\", {\n              category: \"DIRECT\",\n              size: \"L\",\n              variant: \"primary\",\n            })}\n            type=\"button\"\n            onClick={onConfirm}\n            style={{\n              ...getButtonStyle(EDS_COLOR.border.focus, 48),\n              width: \"100%\",\n              marginTop: 24,\n              color: EDS_COLOR.background.surface,\n            }}\n          >\n            확인\n          </button>\n        </section>\n      </Overlay>\n    );\n  }\n\n  const handoff = completionType === \"handoff\";\n  const buttonLabel = handoff ? \"다음 문서 작성하기\" : \"확인\";\n\n  const handleCompletionCta = () => {\n    if (handoff) {\n      onConfirm();\n      return;\n    }\n\n    window.location.href = ESIGNON_HOME_URL;\n  };\n\n  return (\n    <Overlay\n      onClose={undefined}\n      zIndex={600}\n      dim={!isCompact}\n    >\n      <section\n        {...getEdsProps(\"MODAL\", {\n          category: \"COMPOSITE\",\n          variant: isCompact ? \"Custom Fullscreen\" : \"Type B structure\",\n          state: handoff ? \"completion-handoff\" : \"completion-final\",\n        })}\n        className=\"anim-su\"\n        role=\"dialog\"\n        aria-modal=\"true\"\n        aria-labelledby=\"result-modal-title-complete\"\n        aria-describedby=\"result-modal-subtitle-complete\"\n        onClick={(event) => eHeight: 1.5,\n                      fontWeight: 700,\n                    }}\n                  >\n                    다음 수신인에게 문서를 전달했어요.\n                  </p>\n                  <p\n                    style={{\n                      margin: 0,\n                      color: EDS_COLOR.text.primary,\n                      fontSize: 15,\n                      lineHeight: 1.5,\n                      fontWeight: 500,\n                    }}\n                  >\n                    문서가 완료되면 알림을 보내드릴게요.\n                  </p>\n                </>\n              ) : (\n                <>\n                  <p\n                    style={{\n                      margin: 0,\n                      color: EDS_COLOR.text.primary,\n                      fontSize: 15,\n                      lineHeight: 1.5,\n                      fontWeight: 500,\n                    }}\n                  >\n                    완료된 문서는\n                  </p>\n                  <p\n                    style={{\n                      margin: 0,\n                      color: EDS_COLOR.text.primary,\n                      fontSize: 15,\n                      lineHeight: 1.5,\n                      fontWeight: 500,\n                    }}\n                  >\n                    알림톡이나 이메일로 확인해 보세요.\n                  </p>\n                </>\n              )}\n            </div>\n\n            <div\n              data-eds-slot=\"body\"\n              style={{ marginTop: isCompact ? 30 : 26 }}\n            >\n              <CompletionSequencePanel\n                mode={completionType}\n                isCompact={isCompact}\n              />\n            </div>\n\n            <div\n              data-eds-slot=\"body2\"\n              style={{ marginTop: 20 }}\n            >\n              <CompletionWaitingDocuments isCompact={isCompact} />\n            </div>\n\n          </div>\n        </main>\n\n        <footer\n          data-eds-slot=\"cta\"\n          style={{\n            padding: isCo owHelp, setShowHelp] = useState(false);\n  const [showAttachments, setShowAttachments] = useState(false);\n  const [showMobileMore, setShowMobileMore] = useState(false);\n  const [showMore, setShowMore] = useState(false);\n  const [isSaved, setIsSaved] = useState(false);\n  const [leftCollapsed, setLeftCollapsed] = useState(false);\n  const [rightCollapsed, setRightCollapsed] = useState(false);\n  const docRef = useRef(null);\n  const page1Ref = useRef(null);\n  const page2Ref = useRef(null);\n  const fieldRefs = useRef({});\n\n  useEffect(() => {\n    if (isCompact) {\n      setLeftCollapsed(false);\n      setRightCollapsed(false);\n    }\n  }, [isCompact]);\n  const [name, setName] = useState(\"\");\n  const [rrn, setRrn] = useState(\"\");\n  const [address, setAddress] = useState(\"\");\n  const [phone, setPhone] = useState(\"\");\n  const [email, setEmail] = useState(\"\");\n  const [purpose, setPurpose] = useState(\"\");\n  const [purposeDirect, setPurposeDirect] = useState(\"\");\n  const [items, setItems] = useState([]);\n  const [retention, setRetention] = useState(\"\");\n  const [thirdParty, setThirdParty] = useState(\"\");\n  const [idFile, setIdFile] = useState(null);\n  const [date, setDate] = useState(\"\");\n  const [sig, setSig] = useState(null);\n\n  useEffect(() => {\n    if (isSaved) setIsSaved(false);\n  }, [\n    name,\n    rrn,\n    address,\n    phone,\n    email,\n    purpose,\n    purposeDirect,\n    items,\n    retention,\n    thirdParty,\n    idFile,\n    date,\n    sig,\n  ]);\n\n  const setFR = (id) => (element) => {\n    if (element) fieldRefs.current[id] = element;\n    else delete fieldRefs.current[id];\n  };\n\n  const fields = useMemo(\n    () => [\n      {\n        id: \"name\",\n        label: \"성명\",\n        type: \"text\",\n        value: name,\n        setter: setName,\n        required: true,\n        desc: \"동의자의 성명을 입력해 주세요.\",\n      },\n      {\n        id: \"rrn\",\n        label: \"생년월일\",\n        type: \"text\",\n
