rimary\"],\n    custom: [\"이전·다음 2버튼 내비게이션\"],\n  },\n  signatureDialogActions: {\n    category: \"DIRECT\",\n    eds: \"BUTTON\",\n    variants: [\"secondaryGray\", \"primary\"],\n    responsiveSize: \"L(PC 48px) / XL(Mobile 56px)\",\n    sharedStyle: \"getSecondaryGrayButtonStyle\",\n    custom: [\"PC 취소 / Mobile 이전의 동작별 라벨\"],\n  },\n  signatureAttachmentInput: {\n    category: \"DIRECT\",\n    eds: \"ATTACHMENT_INPUT\",\n    scope: \"empty / hasValue single-image states\",\n    states: [\"enabled\", \"hover\", \"dragActive\", \"hasValue\"],\n    custom: [\n      \"PNG·JPG·WEBP accept\",\n      \"인감 이미지 Data URL 저장\",\n      \"자필서명 캔버스와 동일한 260px 고정 높이\",\n    ],\n  },\n  documentField: {\n    category: \"DIRECT\",\n    eds: \"FIELD.player\",\n    state: \"required/optional/completed/active\",\n  },\n  leftSidebar: { category: \"CUSTOM\", code: \"LeftSidebar\" },\n  documentCanvas: { category: \"CUSTOM\", code: \"Document page canvas\" },\n  progress: { category: \"CUSTOM\", code: \"Required progress\" },\n  authFlowFrame: {\n    category: \"CUSTOM\",\n    code: \"AuthFlowFrame\",\n    layout: \"desktop centered panel / mobile fullscreen\",\n    composedOf: [\"TEXT_FIELD/L\", \"BUTTON/XL\", \"LINK_TEXT\"],\n    custom: [\n      \"본인확인·비밀번호 확인·전자서명 동의 전용 화면 프레임\",\n      \"인증 흐름을 위해 별도로 제작한 Header·Content·Footer 구조\",\n      \"모바일 인증 입력 흐름과 키패드 상태 기반 CTA 전환\",\n    ],\n  },\n  authField: {\n    category: \"CUSTOM\",\n    code: \"AuthField\",\n    composedOf: [\"TEXT_FIELD/L\", \"CALLOUT\", \"LINK_TEXT\"],\n  },\n  authReadonlyValue: {\n    category: \"CUSTOM\",\n    code: \"AuthReadonlyValue\",\n    tokenMapping: [\n      \"RADIUS.component.input\",\n      \"EDS_COLOR.background.base\",\n      \"EDS_COLOR.border.default\",\n      \"TYPOGRAPHY.contextMap.input.value.L\",\n    ],\n    custom: [\"입력 불가 사전 확인 정보\", \"높이 48px 고정\"],\n  },\n  authConsentContent: {\n    category: \"CUSTOM\",\n    code: \"AuthConsentContent\",\n    composedOf: [\n      \"AUTH_NOTICE_ITEM × 4\",\n      \"LEGAL_BASIS_LIST/compact\",\n      \"LINK_TEXT × 2\",\n      \"BUTTON/XL(PC·Mobile)/primary\",\n    ],\n    custom: [\n      \"기존 동의 화면 레이아웃 유지\",\n      \"법적 근거 텍스트 목록 삽입\",\n      \"동의 내용 체크 목록 적용\",\n      \"마지막 동의 항목 내 약관·개인정보처리방침 인라인 링크\",\n      \"섹션 제목·인라인 링크만 bold 적용\",\n      \"안내·법적 근거·동의 내용 본문 EDS 기본 16px 통일\",\n    ],\n  },\n  authScrollFog: {\n    category: \"CUSTOM\",\n    code: \"AuthScrollFog\",\n    reference: \"SEED Design Scroll Fog\",\n    tokenMapping: [\n      \"EDS_COLOR.background.surface\",\n      \"SPACING.semantic.globalGutter\",\n    ],\n    custom: [\n      \"스크롤 잔여 영역 감지\",\n      \"Footer 상단 white-only fog 표시·해제\",\n    ],\n  },\n  documentZoomLayer: {\n    category: \"CUSTOM\",\n    code: \"DocumentZoomLayer\",\n    tokenMapping: [\"FIELD.player\", \"Document canvas\"],\n    custom: [\n      \"문서 페이지에만 scale 적용\",\n      \"Header·Bottom Sheet·Footer 확대 제외\",\n    ],\n  },\n  rejectedResultDialog: {\n    category: \"DIRECT\",\n    eds: \"MODAL\",\n    variant: \"Type A / Dialog\",\n    composedOf: [\"Title\", \"Subtitle\", \"BUTTON/L/primary\"],\n  },\n  completionResultModal: {\n    category: \"COMPOSITE\",\n    composedOf: [\n      \"MODAL/Type B\",\n      \"CUSTOM/Fullscreen(compact variation)\",\n      \"SEGMENTED_CONTROL/sm\",\n      \"ICON_BUTTON/M/tertiary\",\n      \"BUTTON/L(PC)·XL(compact)/primary\",\n    ],\n    slots: [\n      \"icon\",\n      \"title\",\n      \"subtitle\",\n      \"body\",\n      \"body2\",\n      \"cta\",\n    ],\n    custom: [\n      \"태블릿·모바일 풀스크린 변형\",\n      \"완료 유형 전환\",\n      \"진행 순서 타임라인\",\n      \"대기 문서 카드\",\n      \"상태 아이콘\",\n      \"최종 완료 확인 시 서비스 홈페이지 이동\",\n    ],\n  },\n\n};\n\n/**\n * Adds implementation-handoff metadata without changing the rendered UI.\n * Replace native elements with real EDS React components during production implementation.\n */\nconst getEdsProps = (component, options = {}) => ({\n  \"data-eds-component\": component,\n  ...(options.size ? { \"data- {bsSubtitleStyle}>{subtitle}</div>\n        </div>\n      )}\n    </div>\n  );\n}\n\n/**\n * DIRECT: TEXT_FIELD의 입력부와 helper/error message를 하나의 폼 항목으로 묶습니다.\n *\n * 바텀시트 Body의 16px gap은 서로 다른 입력 필드 사이에만 적용하고,\n * 필드와 오류 문구 사이는 TEXT_FIELD 내부 간격으로 별도 관리합니다.\n */\nfunction TextFieldMessage({ children, tone = \"error\" }) {\n  if (!children) return null;\n\n  return (\n    <p\n      {...getEdsProps(\"TEXT_FIELD.ErrorMessage\", {\n        category: \"DIRECT\",\n        state: tone,\n      })}\n      role={tone === \"error\" ? \"alert\" : undefined}\n      style={{\n        margin: \"6px 2px 0\",\n        fontSize: 14,\n        lineHeight: 1.5,\n        fontWeight: 400,\n        color:\n          tone === \"error\"\n            ? EDS_COLOR.text.error\n            : EDS_COLOR.text.secondary,\n      }}\n    >\n      {children}\n    </p>\n  );\n}\n\nfunction TextFieldStack({ children }) {\n  return (\n    <div\n      {...getEdsProps(\"TEXT_FIELD.FieldStack\", {\n        category: \"COMPOSITE\",\n      })}\n      style={{\n        position: \"relative\",\n        zIndex: 3,\n        width: \"100%\",\n        display: \"flex\",\n        flexDirection: \"column\",\n        minWidth: 0,\n        overflow: \"visible\",\n      }}\n    >\n      {children}\n    </div>\n  );\n}\n\nfunction BottomSheetBody({\n  children,\n  style,\n  variant = \"input\",\n  hasSubtitle = true,\n}) {\n  const isItemList = variant === \"itemList\";\n  const paddingTop = hasSubtitle ? 4 : 8;\n  const scrollRef = useRef(null);\n  const [hasOverflow, setHasOverflow] = useState(false);\n  const [showBottomFog, setShowBottomFog] = useState(false);\n\n  useEffect(() => {\n    const element = scrollRef.current;\n    if (!element) return undefined;\n\n    const updateScrollFog = () => {\n      const overflowing = element.scrollHeight > element.clientHeight + 1;\n      const hasMoreBelow =\n        element.scrollTop + element.clientHeight < element.scrollHeight - 1;\n      setHasOverflow(overflowing);\n      setShowBottomFog(overflowing && hasMoreBelow);\n    };\n\n    updateScrollFog();\n    const frame = window.requestAnimationFrame(updateScrollFog);\n    const resizeObserver =\n      typeof ResizeObserver === \"undefined\"\n        ? null\n        : new ResizeObserver(updateScrollFog);\n    resizeObserver?.observe(element);\n    Array.from(element.children).forEach((child) =>\n      resizeObserver?.observe(child),\n    );\n    window.addEventListener(\"resize\", updateScrollFog);\n\n    return () => {\n      window.cancelAnimationFrame(frame);\n      resizeObserver?.disconnect();\n      window.removeEventListener(\"resize\", updateScrollFog);\n    };\n  }, [children, variant]);\n\n  return (\n    <div\n      style={{\n        flex: 1,\n        minHeight: 0,\n        position: \"relative\",\n        display: \"flex\",\n        flexDirection: \"column\",\n        overflow: \"hidden\",\n      }}\n    >\n      <div\n        ref={scrollRef}\n        {...getEdsProps(\"BOTTOM_SHEET.Body\", {\n          category: \"DIRECT\",\n          variant,\n        })}\n        onScroll={() => {\n          const element = scrollRef.current;\n          if (!element) return;\n          setShowBottomFog(\n            element.scrollHeight > element.clientHeight + 1 &&\n              element.scrollTop + element.clientHeight < element.scrollHeight - 1,\n          );\n        }}\n        style={{\n          width: \"100%\",\n          flex: 1,\n          minHeight: 0,\n          overflowY: \"auto\",\n          padding: `${paddingTop}px ${isItemList ? 0 : 16}px ${\n            isItemList ? 0 : 8\n          }px`,\n          display: \"flex\",\n          flexDirection: \"column\",\n          gap: isItemList ? 0 : variant === \"input\" ? 16 : 12,\n          ...style,\n        }}\n      >\n        {children}\n        {hasOverflow && (\n          <div aria-hidden=\"true\" style={{ height: 32, flexShrink: 0 }} />\n        )}\n      </div>\n\n      {showBottomFog && (\n        <div\n          {...getEdsProps(\"BOTTOM_SHEET.ScrollFog\", {\n            category: \"DIRECT\",\n            variant: \"bottom\",\n          })}\n          aria-hidden=\"true\"\n          style={{\n            position: \"absolute\",\n            left: 0,\n            right: 0,\n            bottom: 0,\n            height: 32,\n            pointerEvents: \"none\",\n            background:\n              \"linear-gradient(to bottom, rgba(255,255,255,0), #FFFFFF)\",\n          }}\n        />\n      )}\n    </div>\n  );\n}\n\nfunction BottomSheetButtonArea({ children }) {\n  return (\n    <div\n      {...getEdsProps(\"BOTTOM_SHEET.CTA\", { category: \"DIRECT\" })}\n      style={{\n        position: \"relative\",\n        zIndex: 1,\n        padding: \"12px 16px 0\",\n        flexShrink: 0,\n        background: EDS_COLOR.background.surface,\n      }}\n    >\n      {children}\n    </div>\n  );\n}\n\nfunction Modal({\n  title,\n  subtitle,\n  children,\n  footer,\n  onClose,\n  onBack,\n  backLabel,\n  maxWidth = 480,\n}) {\n  return (\n    <Overlay onClose={onClose}>\n      <div\n        {...getEdsProps(\"MODAL\", { variant: \"Type B\", category: \"DIRECT\" })}\n        className=\"anim-su\"\n        onClick={(e) => e.stopPropagation()}\n        style={{\n          width: \"calc(100% - 32px)\",\n          maxWidth,\n          maxHeight: \"88vh\",\n          background: EDS_COLOR.background.surface,\n          borderRadius: RADIUS.scale.xl,\n          boxShadow: \"0 24px 64px rgba(0,0,0,.18)\",\n          display: \"flex\",\n          flexDirection: \"column\",\n          overflow: \"hidden\",\n          pointerEvents: \"auto\",\n        }}\n      >\n        {title && (\n          <header\n            data-eds-slot=\"header\"\n            style={{\n              position: \"relative\",\n              padding: \"24px 64px 0 24px\",\n              flexShrink: 0,\n            }}\n          >\n            {onBack && (\n              <button\n                type=\"button\"\n                style={{\n                  ...getIconButtonStyle(40),\n                  width: backLabel ? \"auto\" : 40,\n                  minWidth: 40,\n                  padding: backLabel ? \"0 8px\" : 0,\n                  gap: backLabel ? 2 : 0,\n                  position: \"absolute\",\n                  top: 19,\n                  left: 16,\n                  fontSize: 15,\n                  lineHeight: \"22px\",\n                  fontWeight: 600,\n                  color: EDS_PALETTE.Gray[700],\n                }}\n                onClick={onBack}\n                aria-label={backLabel || \"이전 단계\"}\n              >\n                <ChevronLeft\n                  size={20}\n                  color={EDS_PALETTE.Gray[700]}\n                  strokeWidth={2.5}\n                />\n                {backLabel && <span>{backLabel}</span>}\n              </button>\n            )}\n            <div\n              style={{\n                minWidth: 0,\n                marginLeft: onBack ? (backLabel ? 88 : 40) : 0,\n              }}\n            >\n              <div\n                style={{\n                  margin: 0,\n                  fontSize: 20,\n                  lineHeight: \"30px\",\n                  fontWeight: 700,\n                  color: EDS_COLOR.text.primary,\n                  whiteSpace: \"nowrap\",\n                  overflow: \"hidden\",\n                  textOverflow: \"ellipsis\",\n                }}\n              >\n                {title}\n              </div>\n              {subtitle && (\n                <div\n                  style={{\n                    marginTop: 8,\n                    paddingBottom: 16,\n                    fontSize: 16,\n                    lineHeight: 1.5,\n                    fontWeight: 400,\n                    color: EDS_COLOR.text.secondary,\n                  }}\n                >\n                  {subtitle}\n                </div>\n              )}\n            </div>\n            <button\n              type=\"button\"\n              style={{\n                ...getIconButtonStyle(40),\n                position: \"absolute\",\n                top: 19,\n                right: 24,\n              }}\n              onClick={onClose}\n              aria-label=\"모달 닫기\"\n            >\n              <X size={20} color={EDS_PALETTE.Gray[700]} />\n            </button>\n          </header>\n        )}\n        <div\n          data-eds-slot=\"body\"\n          style={{\n            flex: 1,\n            minHeight: 0,\n            overflowY: \"auto\",\n            padding: title ? \"8px 24px\" : 24,\n          }}\n        >\n          {children}\n        </div>\n        {footer && (\n          <div\n            data-eds-slot=\"footer\"\n            style={{\n              position: \"relative\",\n              padding: \"16px 24px 24px\",\n              background: EDS_COLOR.background.surface,\n              flexShrink: 0,\n            }}\n          >\n            {footer}\n          </div>\n        )}\n      </div>\n    </Overlay>\n  );\n}\n\nfunction TypeADialog({\n  title,\n  subtitle,\n  children,\n  footer,\n  onClose,\n  maxWidth = 400,\n}) {\n  return (\n    <Overlay onClose={onClose}>\n      <section\n        {...getEdsProps(\"MODAL\", {\n          variant: \"Type A / Dialog\",\n          category: \"DIRECT\",\n        })}\n        className=\"anim-su\"\n        role=\"dialog\"\n        aria-modal=\"true\"\n        onClick={(event) => event.stopPropagation()}\n        style={{\n          width: \"calc(100% - 32px)\",\n          maxWidth,\n          maxHeight: \"88vh\",\n          overflowY: \"auto\",\n          padding: 24,\n          borderRadius: RADIUS.component.modal.value,\n          background: EDS_COLOR.background.surface,\n          boxShadow: \"0 24px 64px rgba(0,0,0,.18)\",\n          pointerEvents: \"auto\",\n        }}\n      >\n        <h2\n          style={{\n            margin: 0,\n            fontSize: 22,\n            lineHeight: 1.5,\n            fontWeight: 700,\n            color: EDS_COLOR.text.primary,\n          }}\n        >\n          {title}\n        </h2>\n        {subtitle && (\n          <div\n            style={{\n              marginTop: 8,\n              fontSize: 16,\n              lineHeight: 1.5,\n              fontWeight: 400,\n              color: EDS_COLOR.text.secondary,\n            }}\n          >\n            {subtitle}\n          </div>\n        )}\n        {children && <div style={{ marginTop: 24 }}>{children}</div>}\n        {footer && <div style={{ marginTop: 24 }}>{footer}</div>}\n      </section>\n    </Overlay>\n  );\n}\n\nfunction BaseDialog({\n  isCompact,\n  title,\n  subtitle,\n  children,\n  footer,\n  onClose,\n  onBack,\n  backLabel,\n  maxWidth = 480,\n  pcVariant = \"Type B\",\n}) {\n  if (isCompact) {\n    return (\n      <Overlay onClose={onClose} align=\"flex-end\">\n        <Sheet>\n          <BottomSheetHeader\n            title={title}\n            subtitle={subtitle}\n            onBack={onBack}\n            backLabel={backLabel}\n            onClose={footer ? undefined : onClose}\n          />\n          <BottomSheetBody\n            variant=\"input\"\n            hasSubtitle={Boolean(subtitle)}\n            style={{ paddingBottom: footer ? 0 : 16 }}\n          >\n            {children}\n          </BottomSheetBody>\n          {footer && <BottomSheetButtonArea>{footer}</BottomSheetButtonArea>}\n        </Sheet>\n      </Overlay>\n    );\n  }\n  if (pcVariant === \"Type A\") {\n    return (\n      <TypeADialog\n        title={title}\n        subtitle={subtitle}\n        onClose={onClose}\n        maxWidth={maxWidth}\n        footer={footer}\n      >\n        {children}\n      </TypeADialog>\n    );\n  }\n  return (\n    <Modal\n      title={title}\n      subtitle={subtitle}\n      onClose={onClose}\n      onBack={onBack}\n      backLabel={backLabel}\n      maxWidth={maxWidth}\n      footer={footer}\n    >\n      {children}\n    </Modal>\n  );\n}\n\n// ============================================================================\n// 5. 본인확인·비밀번호 확인·전자서명 동의 전용 흐름\n// ============================================================================\n//\n// 별도 제작 기준\n// - AuthFlowFrame: CUSTOM / PC 중앙 패널·Mobile Fullscreen 전용 구조\n// - AuthFooter: CUSTOM / 인증 흐름 전용 하단 액션 영역\n// - AuthField, AuthNoticeList: CUSTOM / 서비스 전용 정보 구조\n// - 내부 입력창: DIRECT / TEXT_FIELD L\n// - 내부 버튼: DIRECT / BUTTON XL(PC·Mobile)\n// - 약관 링크: DIRECT / LINK TEXT\n//\n// 화면 프레임은 별도 제작 영역입니다. data-eds-* 메타데이터는 실제\n// EDS를 쓰는 내부 입력창·버튼·링크에만 둡니다.\n\nconst authTextField = (focused, error) => ({\n  width: \"100%\",\n  // 인증 화면의 입력 요소는 디바이스와 관계없이 EDS TEXT_FIELD / L(48px).\n  height: 48,\n  borderRadius: RADIUS.component.input.value,\n  border: `1px solid ${\n    error\n      ? EDS_COLOR.border.error\n      : focused\n        ? EDS_COLOR.border.focus\n        : EDS_COLOR.border.default\n  }`,\n  outline:\n    focused || error\n      ? `1px solid ${\n          error ? EDS_COLOR.border.error : EDS_COLOR.border.focus\n        }`\n      : \"none\",\n  outlineOffset: 0,\n  background: EDS_COLOR.background.surface,\n  padding: \"0 16px\",\n  fontSize: 16,\n  color: EDS_COLOR.text.primary,\n  boxShadow: error\n    ? `0 0 0 4px ${EDS_COLOR.opacity.red[10]}`\n    : focused\n      ? focusShadow\n      : \"none\",\n});\n\nfunction AuthScrollFog({ visible, footerHeight = 88 }) {\n  if (!visible) return null;\n\n  return (\n    <div\n      {...getEdsProps(\"SCROLL_FOG\", {\n        category: \"CUSTOM\",\n        variant: \"bottom\",\n        state: \"visible\",\n      })}\n      aria-hidden=\"true\"\n      style={{\n        position: \"fixed\",\n        left: 0,\n        right: 0,\n        bottom: footerHeight,\n        zIndex: 2,\n        height: 40,\n        pointerEvents: \"none\",\n        background:\n          \"linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,.72) 56%, rgba(255,255,255,1))\",\n        boxShadow: \"none\",\n        transition: \"opacity 160ms ease\",\n      }}\n    />\n  );\n}\n\nfunction AuthFooter({ children, isMobile }) {\n  return (\n    <div\n      data-auth-component=\"AuthFooter\"\n      style={{\n        position: isMobile ? \"fixed\" : \"static\",\n        left: isMobile ? 0 : \"auto\",\n        right: isMobile ? 0 : \"auto\",\n        bottom: isMobile ? 0 : \"auto\",\n        zIndex: isMobile ? 2 : \"auto\",\n        width: \"100%\",\n        padding: isMobile\n          ? \"12px 16px calc(16px + env(safe-area-inset-bottom))\"\n          : 0,\n        background: EDS_COLOR.background.surface,\n        borderTop: \"none\",\n        boxShadow: \"none\",\n      }}\n    >\n      {children}\n    </div>\n  );\n}\n\nfunction AuthFlowFrame({\n  title,\n  children,\n  footer,\n  desktopMaxWidth = 420,\n}) {\n  const width = useWindowWidth(1024);\n  const isMobile = width < BP_MOBILE;\n  const mobileScrollRef = useRef(null);\n  const [showBottomFog, setShowBottomFog] = useState(false);\n\n  const updateBottomFog = () => {\n    const element = mobileScrollRef.current;\n    if (!element) return;\n\n    const remaining =\n      element.scrollHeight - element.scrollTop - element.clientHeight;\n    setShowBottomFog(remaining > 2);\n  };\n\n  useEffect(() => {\n    if (!isMobile) return undefined;\n\n    const element = mobileScrollRef.current;\n    if (!element) return undefined;\n\n    const frameId = window.requestAnimationFrame(updateBottomFog);\n    const observer =\n      typeof ResizeObserver !== \"undefined\"\n        ? new ResizeObserver(updateBottomFog)\n        : null;\n\n    observer?.observe(element);\n    if (element.firstElementChild) {\n      observer?.observe(element.firstElementChild);\n    }\n\n    return () => {\n      window.cancelAnimationFrame(frameId);\n      observer?.disconnect();\n    };\n  }, [isMobile, children]);\n\n  if (isMobile) {\n    return (\n      <div\n        data-auth-component=\"AuthFlowFrame\"\n        data-auth-layout=\"mobile-fullscreen\"\n        className=\"anim-fi\"\n        style={{\n          position: \"fixed\",\n          inset: 0,\n          zIndex: 420,\n          background: EDS_COLOR.background.surface,\n        }}\n      >\n        <main\n          ref={mobileScrollRef}\n          onScroll={updateBottomFog}\n          {...getEdsProps(\"SCROLL_FOG.viewport\", {\n            category: \"CUSTOM\",\n            variant: \"bottom\",\n          })}\n          style={{\n            height: \"100%\",\n            overflowY: \"auto\",\n            overscrollBehavior: \"contain\",\n            padding: \"48px 20px 152px\",\n          }}\n        >\n          <div>\n          <h2\n            style={{\n              margin: \"0 0 24px\",\n              fontSize: 24,\n              lineHeight: 1.5,\n              fontWeight: 700,\n            }}\n          >\n            {title}\n          </h2>\n          {children}\n          </div>\n        </main>\n        <AuthScrollFog visible={showBottomFog} footerHeight={88} />\n        <AuthFooter isMobile>{footer}</AuthFooter>\n      </div>\n    );\n  }\n\n  return (\n    <div\n      data-auth-component=\"AuthFlowFrame\"\n      data-auth-layout=\"desktop-centered-panel\"\n      className=\"anim-fi\"\n      style={{\n        position: \"fixed\",\n        inset: 0,\n        zIndex: 420,\n        background: EDS_COLOR.background.disabled,\n        display: \"flex\",\n        alignItems: \"center\",\n        justifyContent: \"center\",\n        padding: 16,\n      }}\n    >\n      <div\n        className=\"anim-su\"\n        style={{\n          width: \"calc(100% - 32px)\",\n          maxWidth: desktopMaxWidth,\n          background: EDS_COLOR.background.surface,\n          borderRadius: RADIUS.scale.xl,\n          padding: \"24px\",\n          boxShadow: \"0 24px 64px rgba(0,0,0,.18)\",\n        }}\n      >\n        <h2\n          style={{\n            margin: \"0 0 20px\",\n            fontSize: 22,\n            lineHeight: 1.5,\n            fontWeight: 700,\n          }}\n        >\n          {title}\n        </h2>\n        {children}\n        <AuthFooter isMobile={false}>\n          <div style={{ display: \"flex\", marginTop: 24 }}>{footer}</div>\n        </AuthFooter>\n      </div>\n    </div>\n  );\n}\n\nfunction AuthField({ label, children }) {\n  return (\n    <div\n      {...getEdsProps(\"AUTH_FIELD\", { category: \"CUSTOM\" })}\n      style={{ display: \"flex\", flexDirection: \"column\", gap: 8 }}\n    >\n      <label\n        style={{\n          fontSize: 14,\n          lineHeight: 1.5,\n          fontWeight: 600,\n          color: EDS_COLOR.text.secondary,\n        }}\n      >\n        {label}\n      </label>\n      {children}\n    </div>\n  );\n}\n\nfunction PrimaryAuthButton({ children, enabled, onClick }) {\n  return (\n    <button\n      {...getEdsProps(\"BUTTON\", {\n        category: \"DIRECT\",\n        size: \"XL\",\n        variant: \"primary\",\n        state: enabled ? \"enabled\" : \"disabled\",\n      })}\n      type=\"button\"\n      aria-disabled={!enabled}\n      onClick={onClick}\n      style={{\n        ...getButtonStyle(\n          enabled ? EDS_COLOR.border.focus : EDS_COLOR.background.disabled,\n          56,\n        ),\n        color: enabled\n          ? EDS_COLOR.background.surface\n          : EDS_COLOR.text.tertiary,\n        width: \"100%\",\n      }}\n    >\n      {children}\n    </button>\n  );\n}\n\nfunction PhoneAuthScreen({ onVerified }) {\n  const width = useWindowWidth(1024);\n  const isMobile = width < BP_MOBILE;\n  const [lastDigits, setLastDigits] = useState(\"\");\n  const [focused, setFocused] = useState(false);\n  const [inputStarted, setInputStarted] = useState(false);\n  const [error, setError] = useState(\"\");\n  const inputRef = useRef(null);\n  const canSubmit = lastDigits.length === 4;\n\n  const activateInput = () => {\n    setInputStarted(true);\n    inputRef.current?.focus?.({ preventScroll: true });\n  };\n\n  const submit = () => {\n    if (!inputStarted) {\n      activateInput();\n      return;\n    }\n    if (!canSubmit) {\n      setError(\"휴대폰번호 마지막 4자리를 입력해주세요.\");\n      inputRef.current?.focus?.();\n      return;\n    }\n    if (lastDigits !== PHONE_LAST_DIGITS) {\n      setError(\"휴대폰번호 뒷자리가 일치하지 않습니다.\");\n      inputRef.current?.focus?.();\n      return;\n    }\n    setError(\"\");\n    onVerified();\n  };\n\n  const readonlyBox = {\n    // 입력 요소가 아닌 사전 확인 정보도 EDS L 높이인 48px로 고정합니다.\n    height: 48,\n    borderRadius: RADIUS.component.input.value,\n    border: `1px solid ${EDS_COLOR.border.default}`,\n    background: EDS_COLOR.background.base,\n    padding: \"0 16px\",\n    fontSize: 16,\n    fontWeight: 600,\n    display: \"flex\",\n    alignItems: \"center\",\n  };\n\n  return (\n    <AuthFlowFrame\n      title={\n        <>\n          <span>본인 확인을 위해</span>\n          <br />\n          <span>휴대폰번호를 입력해주세요.</span>\n        </>\n      }\n      footer={\n        <PrimaryAuthButton\n          enabled={!inputStarted || canSubmit}\n          onClick={submit}\n        >\n          {inputStarted ? \"인증하기\" : \"번호 입력하기\"}\n        </PrimaryAuthButton>\n      }\n    >\n      <div\n        style={{\n          display: \"flex\",\n          flexDirection: \"column\",\n          gap: isMobile ? 24 : 18,\n        }}\n      >\n        <AuthField label=\"이름\">\n          <div\n            {...getEdsProps(\"AUTH_READONLY_VALUE\", {\n              category: \"CUSTOM\",\n              size: \"L\",\n            })}\n            style={readonlyBox}\n          >\n            홍길동\n          </div>\n        </AuthField>\n\n        <AuthField label=\"휴대폰번호\">\n          <div\n            style={{\n              display: \"grid\",\n              gridTemplateColumns: \"1fr auto 1.15fr auto 1.15fr\",\n              gap: 8,\n              alignItems: \"center\",\n            }}\n          >\n            <div\n              {...getEdsProps(\"AUTH_READONLY_VALUE\", {\n                category: \"CUSTOM\",\n                size: \"L\",\n              })}\n              style={readonlyBox}\n            >\n              010\n            </div>\n            <strong style={{ color: EDS_COLOR.text.secondary }}>-</strong>\n            <div\n              {...getEdsProps(\"AUTH_READONLY_VALUE\", {\n                category: \"CUSTOM\",\n                size: \"L\",\n              })}\n              style={readonlyBox}\n            >\n              8816\n            </div>\n            <strong style={{ color: EDS_COLOR.text.secondary }}>-</strong>\n            <input\n              {...getEdsProps(\"TEXT_FIELD\", {\n                category: \"DIRECT\",\n                size: \"L\",\n                state: error ? \"error\" : focused ? \"focus\" : \"default\",\n              })}\n              ref={inputRef}\n              value={lastDigits}\n              onClick={() => setInputStarted(true)}\n              onFocus={() => {\n                setInputStarted(true);\n                setFocused(true);\n              }}\n              onBlur={() => setFocused(false)}\n              onChange={(e) => {\n                const nextValue = cleanDigits(e.target.value).slice(0, 4);\n                setError(\"\");\n                setLastDigits(nextValue);\n                if (isMobile && nextValue.length === 4) {\n                  window.requestAnimationFrame(() => inputRef.current?.blur?.());\n                }\n              }}\n              inputMode=\"numeric\"\n              placeholder=\"0000\"\n              aria-label=\"휴대폰 번호 마지막 4자리\"\n              style={{\n                ...authTextField(focused, Boolean(error)),\n                fontSize: 16,\n                fontWeight: 600,\n                cursor: \"text\",\n              }}\n            />\n          </div>\n          {error && (\n            <p\n              style={{\n                margin: \"4px 2px 0\",\n                fontSize: 14,\n                lineHeight: 1.5,\n                color: EDS_COLOR.text.error,\n                fontWeight: 600,\n                whiteSpace: \"nowrap\",\n              }}\n            >\n              {error}\n            </p>\n          )}\n        </AuthField>\n      </div>\n    </AuthFlowFrame>\n  );\n}\n\nfunction PasswordAuthScreen({ onVerified }) {\n  const width = useWindowWidth(1024);\n  const isMobile = width < BP_MOBILE;\n  const [password, setPassword] = useState(\"\");\n  const [focused, setFocused] = useState(false);\n  const [inputStarted, setInputStarted] = useState(false);\n  const [error, setError] = useState(\"\");\n  const inputRef = useRef(null);\n  const canSubmit = password.length >= 4 && password.length <= 15;\n\n  const activateInput = () => {\n    setInputStarted(true);\n    inputRef.current?.focus?.({ preventScroll: true });\n  };\n\n  const submit = () => {\n    if (!inputStarted) {\n      activateInput();\n      return;\n    }\n    if (!canSubmit) {\n      setError(\"비밀번호를 입력해 주세요. 비밀번호는 4~15자입니다.\");\n      inputRef.current?.focus?.();\n      return;\n    }\n    if (password !== DOCUMENT_PASSWORD) {\n      setError(\"비밀번호가 일치하지 않습니다.\");\n      inputRef.current?.focus?.();\n      return;\n    }\n    setError(\"\");\n    onVerified();\n  };\n\n  return (\n    <AuthFlowFrame\n      title={\n        <>\n          <span>본인 확인을 위해</span>\n          <br />\n          <span>비밀번호를 입력해주세요.</span>\n        </>\n      }\n      footer={\n        <PrimaryAuthButton\n          enabled={!inputStarted || canSubmit}\n          onClick={submit}\n        >\n          {inputStarted ? \"인증하기\" : \"비밀번호 입력하기\"}\n        </PrimaryAuthButton>\n      }\n    >\n      <div\n        style={{\n          display: \"flex\",\n          flexDirection: \"column\",\n          gap: isMobile ? 24 : 18,\n        }}\n      >\n        <div\n          {...getEdsProps(\"CALLOUT\", {\n            category: \"DIRECT\",\n            variant: \"information\",\n          })}\n        >\n          <p\n            style={{\n              margin: \"0 0 8px\",\n              fontSize: 14,\n              lineHeight: 1.5,\n              fontWeight: 600,\n              color: EDS_COLOR.text.secondary,\n            }}\n          >\n            힌트\n          </p>\n          <div\n            style={{\n              minHeight: 48,\n              borderRadius: RADIUS.scale.lg,\n              background: EDS_COLOR.background.base,\n              border: `1px solid ${EDS_COLOR.border.default}`,\n              padding: \"12px 16px\",\n              color: EDS_COLOR.text.secondary,\n              fontSize: 16,\n              lineHeight: 1.5,\n            }}\n          >\n            1234\n          </div>\n        </div>\n\n        <AuthField label=\"비밀번호\">\n          <div style={{ position: \"relative\" }}>\n            <LockKeyhole\n              size={20}\n              color={EDS_COLOR.icon.secondary}\n              style={{\n                position: \"absolute\",\n                left: 16,\n                top: \"50%\",\n                transform: \"translateY(-50%)\",\n                pointerEvents: \"none\",\n              }}\n            />\n            <input\n              {...getEdsProps(\"TEXT_FIELD\", {\n                category: \"DIRECT\",\n                size: \"L\",\n                state: error ? \"error\" : focused ? \"focus\" : \"default\",\n              })}\n              ref={inputRef}\n              type=\"password\"\n              value={password}\n              onClick={() => setInputStarted(true)}\n              onFocus={() => {\n                setInputStarted(true);\n                setFocused(true);\n              }}\n              onBlur={() => setFocused(false)}\n              onChange={(e) => {\n                const nextValue = e.target.value.slice(0, 15);\n                setError(\"\");\n                setPassword(nextValue);\n                if (\n                  isMobile &&\n                  nextValue.length === String(DOCUMENT_PASSWORD).length\n                ) {\n                  window.requestAnimationFrame(() => inputRef.current?.blur?.());\n                }\n              }}\n              onKeyDown={(e) => {\n                if (e.key === \"Enter\") {\n                  e.preventDefault();\n                  inputRef.current?.blur?.();\n                  submit();\n                }\n              }}\n              placeholder=\"비밀번호 입력 (4~15자)\"\n              style={{\n                ...authTextField(focused, Boolean(error)),\n                padding: \"0 16px 0 48px\",\n                cursor: \"text\",\n              }}\n            />\n          </div>\n          {error && (\n            <p\n              style={{\n                margin: \"4px 2px 0\",\n                fontSize: 14,\n                lineHeight: 1.5,\n                color: EDS_COLOR.text.error,\n                fontWeight: 600,\n              }}\n            >\n              {error}\n            </p>\n          )}\n        </AuthField>\n      </div>\n    </AuthFlowFrame>\n  );\n}\n\nfunction ConsentNoticeItem({ children }) {\n  return (\n    <li\n      {...getEdsProps(\"AUTH_NOTICE_ITEM\", { category: \"CUSTOM\" })}\n      style={{\n        display: \"flex\",\n        gap: 10,\n        alignItems: \"flex-start\",\n        color: EDS_COLOR.text.secondary,\n        fontSize: 15,\n        lineHeight: 1.55,\n      }}\n    >\n      <Check\n        size={18}\n        color={EDS_COLOR.text.success}\n        strokeWidth={2.5}\n        style={{ marginTop: 2, flexShrink: 0 }}\n      />\n      <span>{children}</span>\n    </li>\n  );\n}\n\nfunction SignatureConsentScreen({ onAgree }) {\n  const width = useWindowWidth(1024);\n  const isMobile = width < BP_MOBILE;\n\n  return (\n    <AuthFlowFrame\n      desktopMaxWidth={560}\n      title={\n        <>\n          <span>전자계약 진행을 위해</span>\n          <br />\n          <span>아래 내용에 동의해 주세요.</span>\n        </>\n      }\n      footer={\n        <PrimaryAuthButton\n          enabled\n          onClick={onAgree}\n        >\n          동의하기\n        </PrimaryAuthButton>\n      }\n    >\n      <div\n        {...getEdsProps(\"AUTH_CONSENT_CONTENT\", {\n          category: \"CUSTOM\",\n          variant: \"original-layout\",\n        })}\n        style={{\n          display: \"flex\",\n          flexDirection: \"column\",\n          gap: 20,\n        }}\n      >\n        <p\n          style={{\n            margin: 0,\n            color: EDS_COLOR.text.secondary,\n            fontSize: 16,\n            lineHeight: 1.6,\n            wordBreak: \"keep-all\",\n          }}\n        >\n          본 계약은 관련 법령에 따라 법적 효력을 갖습니다.\n        </p>\n\n        <div\n          {...getEdsProps(\"LEGAL_BASIS_LIST\", {\n            category: \"CUSTOM\",\n            variant: \"compact\",\n          })}\n          style={{\n            display: \"flex\",\n            flexDirection: \"column\",\n            gap: 10,\n          }}\n        >\n          <p\n            style={{\n              margin: 0,\n              color: EDS_COLOR.text.primary,\n              fontSize: 16,\n              lineHeight: 1.5,\n              fontWeight: 700,\n            }}\n          >\n            [법적 근거]\n          </p>\n\n          <ul\n            style={{\n              margin: 0,\n              paddingLeft: 20,\n              display: \"flex\",\n              flexDirection: \"column\",\n              gap: 8,\n              color: EDS_COLOR.text.secondary,\n              fontSize: 16,\n              lineHeight: 1.6,\n            }}\n          >\n            <li>\n              전자문서 및 전자거래 기본법 제4조 제1항 (전자문서의 효력)\n            </li>\n            <li>\n              전자서명법 제3조 제2항 (전자서명의 효력)\n            </li>\n          </ul>\n        </div>\n\n        <div\n          style={{\n            display: \"flex\",\n            flexDirection: \"column\",\n            gap: 12,\n          }}\n        >\n          <p\n            style={{\n              margin: 0,\n              color: EDS_COLOR.text.primary,\n              fontSize: 16,\n              lineHeight: 1.5,\n              fontWeight: 700,\n            }}\n          >\n            [동의 내용]\n          </p>\n\n          <ul\n            style={{\n              listStyle: \"none\",\n              margin: 0,\n              padding: 0,\n              display: \"flex\",\n              flexDirection: \"column\",\n              gap: 14,\n            }}\n          >\n            <ConsentNoticeItem>\n              본인은 문서의 내용을 충분히 확인하였으며, 입력하는 서명 및 작성\n              내용이 법적 효력을 갖는 것에 동의합니다.\n            </ConsentNoticeItem>\n\n            <ConsentNoticeItem>\n              전자서명법에 따라 서명 완료 후 전송되는 전자문서를 원본으로 인정합니다.\n            </ConsentNoticeItem>\n\n            <ConsentNoticeItem>\n              본인 확인 및 위·변조 방지를 위해 접속 정보(IP, 서명 일시 등)가 문서이력인증서에 기록됨을 인지하고 동의합니다.\n            </ConsentNoticeItem>\n\n            <ConsentNoticeItem>\n              <a\n                {...getEdsProps(\"LINK_TEXT\", {\n                  category: \"DIRECT\",\n                  variant: \"primary\",\n                })}\n                href={ESIGNON_TERMS_URL}\n                target=\"_blank\"\n                rel=\"noreferrer\"\n                style={{\n                  color: EDS_COLOR.text.link,\n                  fontWeight: 700,\n                  textDecoration: \"underline\",\n                  textUnderlineOffset: 3,\n                }}\n              >\n                [이용약관]\n              </a>{\" \"}\n              및{\" \"}\n              <a\n                {...getEdsProps(\"LINK_TEXT\", {\n                  category: \"DIRECT\",\n                  variant: \"primary\",\n                })}\n                href={ESIGNON_PRIVACY_URL}\n                target=\"_blank\"\n                rel=\"noreferrer\"\n                style={{\n                  color: EDS_COLOR.text.link,\n                  fontWeight: 700,\n                  textDecoration: \"underline\",\n                  textUnderlineOffset: 3,\n                }}\n              >\n                [개인정보처리방침]\n              </a>\n              을 확인하였으며 이에 동의합니다.\n            </ConsentNoticeItem>\n          </ul>\n        </div>\n\n      </div>\n    </AuthFlowFrame>\n  );\n}\n\n// 6. 서명 컴포넌트\n// ============================================================================\n\nfunction SignatureSegment({ value, current, onClick }) {\n  const selected = value === current;\n  return (\n    <button\n      type=\"button\"\n      onClick={() => onClick(value)}\n      style={{\n        flex: 1,\n        minWidth: 0,\n        height: 40,\n        border: \"none\",\n        borderRadius: RADIUS.scale.circle,\n        background: selected ? EDS_COLOR.background.surface : \"transparent\",\n        color: selected ? EDS_COLOR.text.primary : EDS_COLOR.text.secondary,\n        boxShadow: selected ? \"0 1px 4px rgba(0,0,0,.08)\" : \"none\",\n        fontSize: 16,\n        fontWeight: 600,\n        lineHeight: 1.5,\n        cursor: \"pointer\",\n        whiteSpace: \"nowrap\",\n      }}\n    >\n      {value}\n    </button>\n  );\n}\n\n/**\n * COMPOSITE: 입력 영역 우측 하단에서 사용하는 초기화 컨트롤입니다.\n * 원형 아이콘 버튼과 \"초기화\" 레이블을 함께 제공해 동작을 명확히 합니다.\n */\nfunction SignatureResetControl({ onClick, disabled = false }) {\n  return (\n    <button\n      {...getEdsProps(\"ICON.Button\", {\n        size: \"L\",\n        variant: \"fill\",\n        category: \"COMPOSITE\",\n      })}\n      type=\"button\"\n      aria-label=\"초기화\"\n      title=\"초기화\"\n      disabled={disabled}\n      onClick={(event) => {\n        event.stopPropagation();\n        if (!disabled) onClick?.();\n      }}\n      style={{\n        position: \"absolute\",\n        right: 12,\n        bottom: 12,\n        zIndex: 2,\n        width: 48,\n        height: 48,\n        flexShrink: 0,\n        borderRadius: RADIUS.scale.circle,\n        border: `1px solid ${EDS_COLOR.border.default}`,\n        background: disabled\n          ? EDS_COLOR.background.disabled\n          : EDS_COLOR.background.surface,\n        color: disabled\n          ? EDS_COLOR.icon.disabled\n          : EDS_COLOR.icon.secondary,\n        boxShadow: \"0 4px 14px rgba(2,9,19,.12)\",\n        display: \"flex\",\n        alignItems: \"center\",\n        justifyContent: \"center\",\n        cursor: disabled ? \"default\" : \"pointer\",\n      }}\n    >\n      <RotateCcw size={20} strokeWidth={2.4} />\n    </button>\n  );\n}\n\nfunction HandwritingPad({ onChange }) {\n  const canvasRef = useRef(null);\n  const drawingRef = useRef(false);\n  const [hasInk, setHasInk] = useState(false);\n\n  useEffect(() => {\n    const canvas = canvasRef.current;\n    if (!canvas) return;\n    const ratio = window.devicePixelRatio || 1;\n    const rect = canvas.getBoundingClientRect();\n    canvas.width = Math.max(1, Math.floor(rect.width * ratio));\n    canvas.height = Math.max(1, Math.floor(rect.height * ratio));\n    const context = canvas.getContext(\"2d\");\n    context.scale(ratio, ratio);\n    context.lineWidth = 3;\n    context.lineCap = \"round\";\n    context.lineJoin = \"round\";\n    context.strokeStyle = EDS_COLOR.text.primary;\n  }, []);\n\n  const getPoint = (event) => {\n    const rect = canvasRef.current.getBoundingClientRect();\n    return {\n      x: event.clientX - rect.left,\n      y: event.clientY - rect.top,\n    };\n  };\n\n  const start = (event) => {\n    event.preventDefault();\n    drawingRef.current = true;\n    const context = canvasRef.current.getContext(\"2d\");\n    const point = getPoint(event);\n    context.beginPath();\n    context.moveTo(point.x, point.y);\n    canvasRef.current.setPointerCapture?.(event.pointerId);\n  };\n\n  const move = (event) => {\n    if (!drawingRef.current) return;\n    event.preventDefault();\n    const context = canvasRef.current.getContext(\"2d\");\n    const point = getPoint(event);\n    context.lineTo(point.x, point.y);\n    context.stroke();\n    setHasInk(true);\n    onChange(canvasRef.current.toDataURL(\"image/png\"));\n  };\n\n  const end = (event) => {\n    if (!drawingRef.current) return;\n    drawingRef.current = false;\n    canvasRef.current.releasePointerCapture?.(event.pointerId);\n    setHasInk(true);\n    onChange(canvasRef.current.toDataURL(\"image/png\"));\n  };\n\n  const clear = () => {\n    const canvas = canvasRef.current;\n    const context = canvas.getContext(\"2d\");\n    context.clearRect(0, 0, canvas.width, canvas.height);\n    setHasInk(false);\n    onChange(\"\");\n  };\n\n  return (\n    <div style={{ position: \"relative\" }}>\n      <canvas\n        ref={canvasRef}\n        aria-label=\"자필서명 입력 영역\"\n        onPointerDown={start}\n        onPointerMove={move}\n        onPointerUp={end}\n        onPointerCancel={end}\n        style={{\n          width: \"100%\",\n          height: 260,\n          display: \"block\",\n          touchAction: \"none\",\n          borderRadius: RADIUS.scale.lg,\n          border: `1px solid ${EDS_COLOR.border.default}`,\n          background: EDS_COLOR.background.surface,\n          cursor: \"crosshair\",\n        }}\n      />\n      <SignatureResetControl onClick={clear} disabled={!hasInk} />\n    </div>\n  );\n}\n\nconst SIGNATURE_FONT_STYLES = [\n  { family: \"'Nanum Pen Script', cursive\", weight: 400, rotate: -3 },\n  { family: \"'Nanum Brush Script', cursive\", weight: 400, rotate: -2 },\n  { family: \"'Black Han Sans', sans-serif\", weight: 400, rotate: 0 },\n  { family: \"'Gowun Batang', serif\", weight: 700, rotate: -1 },\n  { family: \"'Pretendard GOV', sans-serif\", weight: 700, rotate: -4 },\n  { family: \"serif\", weight: 700, rotate: 2 },\n  { family: \"cursive\", weight: 700, rotate: -5 },\n  { family: \"fantasy\", weight: 600, rotate: 1 },\n];\n\nfunction TypedSignatureGrid({ name, selectedIndex, onSelect }) {\n  return (\n    <div\n      style={{\n        maxHeight: 292,\n        overflowY: \"auto\",\n        display: \"grid\",\n        gridTemplateColumns: \"repeat(2, minmax(0, 1fr))\",\n        gap: 8,\n        paddingRight: 2,\n      }}\n    >\n      {SIGNATURE_FONT_STYLES.map((style, index) => {\n        const selected = selectedIndex === index;\n        return (\n          <button\n            key={index}\n            type=\"button\"\n            onClick={() => onSelect(index)}\n            style={{\n              minHeight: 112,\n              borderRadius: RADIUS.scale.lg,\n              border: `${selected ? 2 : 1}px solid ${\n                selected\n                  ? EDS_COLOR.border.focus\n                  : EDS_COLOR.border.default\n              }`,\n              background: selected\n                ? EDS_COLOR.opacity.blue[5]\n                : EDS_COLOR.background.surface,\n              padding: 10,\n              display: \"flex\",\n              alignItems: \"center\",\n              justifyContent: \"center\",\n              cursor: \"pointer\",\n              overflow: \"hidden\",\n            }}\n          >\n            <span\n              style={{\n                fontFamily: style.family,\n                fontSize: 30,\n                fontWeight: style.weight,\n                color: EDS_COLOR.text.primary,\n                transform: `rotate(${style.rotate}deg)`,\n                whiteSpace: \"nowrap\",\n              }}\n            >\n              {name.trim()}\n            </span>\n          </button>\n        );\n      })}\n    </div>\n  );\n}\n\nfunction SigModal({\n  isCompact,\n  onClose,\n  onSave,\n  onPrev,\n  defaultName = \"\",\n}) {\n  const initialName = String(defaultName || \"\").trim();\n  const [mode, setMode] = useState(\"간편 서명\");\n  const [name, setName] = useState(initialName);\n  const [generatedName, setGeneratedName] = useState(initialName);\n  const [isGenerating, setIsGenerating] = useState(false);\n  const [nameFocused, setNameFocused] = useState(false);\n  const [selectedStyle, setSelectedStyle] = useState(0);\n  const [drawnSignature, setDrawnSignature] = useState(\"\");\n  const [stampImage, setStampImage] = useState(null);\n  const [stampDropHovered, setStampDropHovered] = useState(false);\n  const [stampDragActive, setStampDragActive] = useState(false);\n  const fileRef = useRef(null);\n\n  useEffect(() => {\n    const nextName = String(defaultName || \"\").trim();\n    setName(nextName);\n    setGeneratedName(nextName);\n    setSelectedStyle(0);\n  }, [defaultName]);\n\n  const canSave =\n    mode === \"간편 서명\"\n      ? Boolean(generatedName.trim())\n      : mode === \"자필 서명\"\n        ? Boolean(drawnSignature)\n        : Boolean(stampImage?.src);\n\n  const signatureSubtitle =\n    mode === \"간편 서명\"\n      ? generatedName\n        ? \"생성된 서명 중 사용할 서명을 선택해 주세요.\"\n        : \"이름을 확인하고 만들기를 눌러 서명을 생성해 주세요.\"\n      : mode === \"자필 서명\"\n        ? \"아래 영역에 손가락이나 마우스로 서명해 주세요.\"\n        : \"사용할 인감 이미지를 업로드해 주세요.\";\n\n  const signatureTitle = (\n    <span\n      style={{\n        display: \"inline-flex\",\n        alignItems: \"center\",\n        gap: 8,\n        ...bsTitleStyle,\n      }}\n    >\n      서명 / 날인\n      <FieldBadge required completed={false} />\n    </span>\n  );\n\n  const createTypedSignature = () => {\n    const style = SIGNATURE_FONT_STYLES[selectedStyle];\n    const safe = generatedName\n      .trim()\n      .replace(/&/g, \"&amp;\")\n      .replace(/</g, \"&lt;\")\n      .replace(/>/g, \"&gt;\");\n    const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='500' height='180'>\n      <rect width='100%' height='100%' fill='white' fill-opacity='0'/>\n      <text x='250' y='108' text-anchor='middle'\n        font-family=\"${style.family.replace(/'/g, \"\")}\"\n        font-size='72' font-weight='${style.weight}'\n        fill='#191F28' transform='rotate(${style.rotate} 250 90)'>${safe}</text>\n    </svg>`;\n    return `data:image/svg+xml;utf8,${encodeURIComponent(svg)}`;\n  };\n\n  const save = () => {\n    if (!canSave) return;\n    const result =\n      mode === \"간편 서명\"\n        ? createTypedSignature()\n        : mode === \"자필 서명\"\n          ? drawnSignature\n          : stampImage?.src;\n    onSave(result);\n    onClose();\n  };\n\n  const readStamp = (file) => {\n    if (!file) return;\n    const reader = new FileReader();\n    reader.onload = () =>\n      setStampImage({\n        src: String(reader.result || \"\"),\n        name: file.name,\n        size: file.size,\n      });\n    reader.readAsDataURL(file);\n  };\n\n  const formatFileSize = (bytes = 0) => {\n    if (bytes < 1024) return `${bytes} B`;\n    if (bytes < 1024 * 1024) return `${Math.round(bytes / 1024)} KB`;\n    return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;\n  };\n\n  const content = (\n    <>\n      <div\n        {...getEdsProps(\"SEGMENT_CONTROL\", {\n          size: \"L\",\n          variant: \"default\",\n          category: \"DIRECT\",\n        })}\n        style={{\n          width: \"100%\",\n          height: 48,\n          boxSizing: \"border-box\",\n          display: \"flex\",\n          gap: 4,\n          padding: 4,\n          borderRadius: RADIUS.scale.circle,\n          background: EDS_COLOR.background.disabled,\n        }}\n      >\n        {[\"간편 서명\", \"자필 서명\", \"인감 날인\"].map((item) => (\n          <SignatureSegment\n            key={item}\n            value={item}\n            current={mode}\n            onClick={setMode}\n          />\n        ))}\n      </div>\n\n      {mode === \"간편 서명\" && (\n        <>\n          <div\n            {...getEdsProps(\"TEXT_FIELD.WithAction\", {\n              size: \"XL\",\n              category: \"COMPOSITE\",\n            })}\n            style={{\n              width: \"100%\",\n              display: \"grid\",\n              gridTemplateColumns: \"minmax(0, 1fr) 96px\",\n              alignItems: \"start\",\n              gap: 8,\n            }}\n          >\n            <TextFieldStack>\n              <input\n                {...getEdsProps(\"TEXT_FIELD\", {\n                  size: \"XL\",\n                  category: \"DIRECT\",\n                  state: nameFocused ? \"focus\" : \"enabled\",\n                })}\n                aria-label=\"간편 서명에 사용할 이름\"\n                value={name}\n                onFocus={() => setNameFocused(true)}\n                onBlur={() => setNameFocused(false)}\n                onChange={(event) => {\n                  const nextName = event.target.value;\n                  setName(nextName);\n\n                  // 이름을 수정하면 기존 결과를 숨기고 다시 생성하게 합니다.\n                  if (nextName.trim() !== generatedName) {\n                    setGeneratedName(\"\");\n                    setSelectedStyle(0);\n                  }\n                }}\n                onKeyDown={(event) => {\n                  if (event.key === \"Enter\" && name.trim() && !isGenerating) {\n                    event.preventDefault();\n                    setIsGenerating(true);\n                    window.setTimeout(() => {\n                      setGeneratedName(name.trim());\n                      setSelectedStyle(0);\n                      setIsGenerating(false);\n                    }, 280);\n                  }\n                }}\n                placeholder=\"이름을 입력해 주세요.\"\n                style={{\n                  width: \"100%\",\n                  height: 56,\n                  boxSizing: \"border-box\",\n                  borderRadius: RADIUS.component.input.value,\n                  border: `${nameFocused ? 2 : 1}px solid ${\n                    nameFocused\n                      ? EDS_COLOR.border.focus\n                      : EDS_COLOR.border.default\n                  }`,\n                  padding: nameFocused ? \"0 15px\" : \"0 16px\",\n                  outline: \"none\",\n                  boxShadow: nameFocused\n                    ? \"0 0 0 3.5px rgba(0, 136, 255, 0.14)\"\n                    : \"none\",\n                  background: EDS_COLOR.background.surface,\n                  fontSize: 16,\n                  fontWeight: 400,\n                  lineHeight: 1.5,\n                  color: EDS_COLOR.text.primary,\n                  transition: \"border 160ms ease, box-shadow 160ms ease\",\n                }}\n              />\n            </TextFieldStack>\n\n            <button\n              {...getEdsProps(\"BUTTON\", {\n                size: \"XL\",\n                variant: name.trim() ? \"primary\" : \"secondaryGray\",\n                category: \"DIRECT\",\n              })}\n              type=\"button\"\n              disabled={!name.trim() || isGenerating}\n              onClick={() => {\n                setIsGenerating(true);\n                window.setTimeout(() => {\n                  setGeneratedName(name.trim());\n                  setSelectedStyle(0);\n                  setIsGenerating(false);\n                }, 280);\n              }}\n              style={{\n                width: 96,\n                height: 56,\n                padding: \"0 12px\",\n                border: \"none\",\n                borderRadius: RADIUS.component.button.XL.value,\n                background:\n                  name.trim() && !isGenerating\n                    ? EDS_COLOR.border.focus\n                    : EDS_COLOR.background.disabled,\n                color:\n                  name.trim() && !isGenerating\n                    ? EDS_COLOR.background.surface\n                    : EDS_COLOR.text.tertiary,\n                fontSize: 16,\n                fontWeight: 600,\n                lineHeight: 1.5,\n                cursor: name.trim() && !isGenerating ? \"pointer\" : \"default\",\n                whiteSpace: \"nowrap\",\n              }}\n            >\n              {isGenerating ? \"생성 중\" : \"만들기\"}\n            </button>\n          </div>\n\n          {generatedName && (\n            <div className=\"anim-fi\">\n              <TypedSignatureGrid\n                name={generatedName}\n                selectedIndex={selectedStyle}\n                onSelect={setSelectedStyle}\n              />\n            </div>\n          )}\n        </>\n      )}\n\n      {mode === \"자필 서명\" && (\n        <HandwritingPad onChange={setDrawnSignature} />\n      )}\n\n      {mode === \"인감 날인\" && (\n        <div style={{ position: \"relative\" }}>\n          <input\n            ref={fileRef}\n            type=\"file\"\n            accept=\"image/png,image/jpeg,image/webp\"\n            onChange={(event) => readStamp(event.target.files?.[0])}\n            style={{ display: \"none\" }}\n          />\n          {stampImage ? (\n            <div\n              {...getEdsProps(\"ATTACHMENT_INPUT\", {\n                category: \"DIRECT\",\n                variant: \"hasValue\",\n                state: \"hasValue\",\n              })}\n              style={{\n                width: \"100%\",\n                height: 260,\n                boxSizing: \"border-box\",\n                borderRadius: RADIUS.scale.lg,\n                border: `1px solid ${EDS_PALETTE.Gray[200]}`,\n                background: EDS_COLOR.background.surface,\n                display: \"flex\",\n                flexDirection: \"column\",\n                alignItems: \"center\",\n                justifyContent: \"center\",\n                gap: 8,\n                padding: 16,\n                position: \"relative\",\n              }}\n            >\n              <ImageIcon size={28} color={EDS_PALETTE.Gray[500]} />\n              <span\n                style={{\n                  maxWidth: \"calc(100% - 48px)\",\n                  display: \"-webkit-box\",\n                  WebkitBoxOrient: \"vertical\",\n                  WebkitLineClamp: 2,\n                  overflow: \"hidden\",\n                  textAlign: \"center\",\n                  fontSize: 14,\n                  lineHeight: \"20px\",\n                  fontWeight: 600,\n                  color: EDS_PALETTE.Gray[900],\n                }}\n              >\n                {stampImage.name}\n              </span>\n              <span\n                style={{\n                  fontSize: 12,\n                  lineHeight: \"16px\",\n                  fontWeight: 400,\n                  color: EDS_PALETTE.Gray[400],\n                }}\n              >\n                {formatFileSize(stampImage.size)}\n              </span>\n              <button\n                {...getEdsProps(\"ATTACHMENT_INPUT.removeButton\", {\n                  category: \"DIRECT\",\n                  size: \"24px\",\n                })}\n                type=\"button\"\n                aria-label=\"업로드한 인감 이미지 삭제\"\n                title=\"인감 이미지 삭제\"\n                onClick={() => {\n                  setStampImage(null);\n                  if (fileRef.current) fileRef.current.value = \"\";\n                }}\n                style={{\n                  position: \"absolute\",\n                  top: 12,\n                  right: 12,\n                  width: 24,\n                  height: 24,\n                  padding: 0,\n                  borderRadius: RADIUS.scale.circle,\n                  border: `1px solid ${EDS_PALETTE.Gray[200]}`,\n                  background: EDS_COLOR.background.surface,\n                  boxShadow: \"0 2px 8px rgba(0,0,0,0.08)\",\n                  color: EDS_PALETTE.Gray[600],\n                  display: \"flex\",\n                  alignItems: \"center\",\n                  justifyContent: \"center\",\n                  cursor: \"pointer\",\n                }}\n              >\n                <X size={16} />\n              </button>\n            </div>\n          ) : (\n            <button\n              {...getEdsProps(\"ATTACHMENT_INPUT\", {\n                category: \"DIRECT\",\n                variant: \"empty\",\n                state: stampDragActive\n                  ? \"dragActive\"\n                  : stampDropHovered\n                    ? \"hover\"\n                    : \"enabled\",\n              })}\n              type=\"button\"\n              onClick={() => fileRef.current?.click()}\n              onMouseEnter={() => setStampDropHovered(true)}\n              onMouseLeave={() => setStampDropHovered(false)}\n              onDragEnter={(event) => {\n                event.preventDefault();\n                setStampDragActive(true);\n              }}\n              onDragOver={(event) => {\n                event.preventDefault();\n                setStampDragActive(true);\n              }}\n              onDragLeave={(event) => {\n                event.preventDefault();\n                setStampDragActive(false);\n              }}\n              onDrop={(event) => {\n                event.preventDefault();\n                setStampDragActive(false);\n                readStamp(event.dataTransfer.files?.[0]);\n              }}\n              style={{\n                width: \"100%\",\n                height: 260,\n                boxSizing: \"border-box\",\n                borderRadius: RADIUS.scale.lg,\n                border: `1px dashed ${\n                  stampDragActive\n                    ? EDS_PALETTE.Blue[500]\n                    : EDS_PALETTE.Gray[300]\n                }`,\n                background: stampDragActive\n                  ? EDS_PALETTE.Blue[50]\n                  : stampDropHovered\n                    ? EDS_PALETTE.Gray[100]\n                    : EDS_PALETTE.Gray[50],\n                display: \"flex\",\n                flexDirection: \"column\",\n                alignItems: \"center\",\n                justifyContent: \"center\",\n                gap: 8,\n                padding: 16,\n                cursor: \"pointer\",\n                transition: \"background 120ms ease, border-color 120ms ease\",\n              }}\n            >\n              <ImageIcon size={28} color={EDS_PALETTE.Gray[400]} />\n              <span\n                style={{\n                  fontSize: 14,\n                  lineHeight: \"20px\",\n                  fontWeight: 600,\n                  color: EDS_PALETTE.Gray[900],\n                }}\n              >\n                인감 이미지 업로드\n              </span>\n              <span\n                style={{\n                  fontSize: 12,\n                  lineHeight: \"16px\",\n                  fontWeight: 400,\n                  color: EDS_PALETTE.Gray[400],\n                }}\n              >\n                PNG, JPG, WEBP\n              </span>\n            </button>\n          )}\n        </div>\n      )}\n    </>\n  );\n\n  if (!isCompact) {\n    return (\n      <Overlay onClose={onClose} zIndex={520}>\n        <Dialog width={600}>\n          <div\n            style={{\n              padding: \"24px 24px 0\",\n              display: \"flex\",\n              alignItems: \"center\",\n              justifyContent: \"space-between\",\n            }}\n          >\n            <div style={{ flex: 1, minWidth: 0 }}>\n              <div\n                style={{\n                  display: \"flex\",\n                  alignItems: \"center\",\n                  gap: 8,\n                }}\n              >\n                <h2\n                  style={{\n                    margin: 0,\n                    fontSize: 22,\n                    lineHeight: 1.5,\n                    fontWeight: 700,\n                  }}\n                >\n                  서명 / 날인\n                </h2>\n                <FieldBadge required completed={false} />\n              </div>\n              <p\n                style={{\n                  margin: \"6px 0 0\",\n                  fontSize: 16,\n                  lineHeight: 1.5,\n                  fontWeight: 400,\n                  color: EDS_COLOR.text.secondary,\n                }}\n              >\n                {signatureSubtitle}\n              </p>\n            </div>\n            <button\n              type=\"button\"\n              onClick={onClose}\n              className=\"header-icon-btn\"\n            >\n              <X size={20} />\n            </button>\n          </div>\n          <div\n            style={{\n              padding: 24,\n              display: \"flex\",\n              flexDirection: \"column\",\n              gap: 16,\n              overflowY: \"auto\",\n            }}\n          >\n            {content}\n          </div>\n          <div\n            style={{\n              padding: \"0 24px 24px\",\n              display: \"grid\",\n              gridTemplateColumns: \"1fr 1fr\",\n              gap: 8,\n            }}\n          >\n            <button\n              {...getEdsProps(\"BUTTON\", {\n                size: \"L\",\n                variant: \"secondaryGray\",\n                state: \"enabled\",\n                category: \"DIRECT\",\n              })}\n              className=\"eds-secondary-gray-btn\"\n              type=\"button\"\n              onClick={onClose}\n              style={getSecondaryGrayButtonStyle({ height: 48 })}\n            >\n              취소\n            </button>\n            <button\n              type=\"button\"\n              disabled={!canSave}\n              onClick={save}\n              style={{\n                ...getButtonStyle(\n                  canSave\n                    ? EDS_COLOR.border.focus\n                    : EDS_COLOR.background.disabled,\n                  48,\n                ),\n                color: canSave\n                  ? EDS_COLOR.background.surface\n                  : EDS_COLOR.text.tertiary,\n              }}\n            >\n              적용\n            </button>\n          </div>\n        </Dialog>\n      </Overlay>\n    );\n  }\n\n  return (\n    <Overlay dim={false} onClose={onClose} align=\"flex-end\" zIndex={520}>\n      <Sheet>\n        <BottomSheetHeader\n          title={signatureTitle}\n          subtitle={signatureSubtitle}\n          onClose={onClose}\n        />\n        <BottomSheetBody variant=\"input\">\n          {content}\n        </BottomSheetBody>\n        <BottomSheetNav\n          required\n          hasValue={canSave}\n          valid={canSave}\n          isLast\n          onPrev={onPrev}\n          onNext={save}\n        />\n      </Sheet>\n    </Overlay>\n  );\n}\n\n// ============================================================================\n// 7. DOCUMENT CANVAS FIELD COMPONENTS\n// ============================================================================\n\nfunction FieldTooltip({ tooltip }) {\n  if (!tooltip) return null;\n  const color = tooltip.status === \"optional\" ? EDS_PALETTE.Yellow[500] : EDS_COLOR.text.error;\n  return (\n    <div\n      style={{\n        position: \"fixed\",\n        left: tooltip.left,\n        top: tooltip.top,\n        zIndex: 150,\n        transform: \"translate(-50%, -100%)\",\n        pointerEvents: \"none\",\n      }}\n    >\n      <div\n        style={{\n          padding: \"8px 10px\",\n          borderRadius: RADIUS.scale.xs,\n          background: EDS_COLOR.text.primary,\n          color: EDS_COLOR.background.surface,\n          fontSize: 14,\n          fontWeight: 800,\n          whiteSpace: \"nowrap\",\n          display: \"flex\",\n          gap: 5,\n        }}\n      >\n        <span style={{ color }}>\n          {tooltip.status === \"error\"\n            ? \"(오류)\"\n            : tooltip.status === \"required\"\n              ? \"(필수)\"\n              : \"(선택)\"}\n        </span>\n        <span>{tooltip.label}</span>\n      </div>\n      <div\n        style={{\n          width: 0,\n          height: 0,\n          margin: \"0 auto\",\n          borderLeft: \"6px solid transparent\",\n          borderRight: \"6px solid transparent\",\n          borderTop: `6px solid ${EDS_COLOR.text.primary}`,\n        }}\n      />\n    </div>\n  );\n}\n\nfunction PdfFrame({\n  field,\n  left,\n  top,\n  width,\n  height = 48,\n  active,\n  pulse,\n  children,\n  onHover,\n  onLeave,\n}) {\n  const [hovered, setHovered] = useState(false);\n  const state = getFieldStateKey(field);\n  const completed = isFilled(field);\n  const emphasized = pulse || active;\n  const baseTone = completed\n    ? \"completed\"\n    : field?.readonly\n      ? \"readonly\"\n      : field?.required\n        ? \"required\"\n        : \"optional\";\n  const color = emphasized && !completed ? EDS_COLOR.border.focus : state.border;\n  const shadow =\n    emphasized && completed\n      ? FIELD_SHADOW.completed\n      : emphasized\n        ? focusShadow\n        : hovered\n          ? FIELD_SHADOW[baseTone] || \"none\"\n          : \"none\";\n  return (\n    <div\n      ref={field.ref}\n      className={pulse ? \"field-pulse\" : \"\"}\n      onClick={(e) => e.stopPropagation()}\n      onTouchStart={(e) => e.stopPropagation()}\n      onMouseEnter={(e) => {\n        setHovered(true);\n        onHover?.(field, e.currentTarget);\n      }}\n      onMouseLeave={() => {\n        setHovered(false);\n        onLeave?.();\n      }}\n      style={{\n        position: \"absolute\",\n        left,\n        top,\n        width,\n        height,\n        border: `${FIELD_BORDER_W}px solid ${color}`,\n        borderRadius: RADIUS.scale.xs,\n        background: state.bg,\n        boxShadow: shadow,\n        overflow: \"hidden\",\n        zIndex: emphasized ? 12 : 5,\n      }}\n    >\n      {children(state)}\n    </div>\n  );\n}\n\nfunction PdfInput({\n  field,\n  left,\n  top,\n  width,\n  height,\n  active,\n  pulse,\n  onFocus,\n  onHover,\n  onLeave,\n}) {\n  return (\n    <PdfFrame\n      field={field}\n      left={left}\n      top={top}\n      width={width}\n      height={height}\n      active={active}\n      pulse={pulse}\n      onHover={onHover}\n      onLeave={onLeave}\n    >\n      {() => (\n        <input\n          value={field.value || \"\"}\n          type={field.type === \"tel\" ? \"tel\" : field.type}\n          inputMode={field.id === \"phone\" ? \"numeric\" : undefined}\n          placeholder=\"\"\n          onFocus={() => onFocus(field.id)}\n          onClick={(e) => {\n            e.stopPropagation();\n            onFocus(field.id);\n          }}\n          onChange={(e) =>\n            field.setter(\n              field.id === \"phone\"\n                ? formatPhone(e.target.value)\n                : e.target.value,\n            )\n          }\n          style={{\n            width: \"100%\",\n            height: \"100%\",\n            border: \"none\",\n            background: \"transparent\",\n            padding: \"0 8px\",\n            fontSize: getAutoFontSize(),\n            fontWeight: 700,\n            color: isInvalidField(field) ? EDS_COLOR.text.error : EDS_COLOR.text.primary,\n          }}\n        />\n      )}\n    </PdfFrame>\n  );\n}\n\nfunction PdfSelect({\n  field,\n  left,\n  top,\n  width,\n  height,\n  active,\n  pulse,\n  onFocus,\n  onHover,\n  onLeave,\n}) {\n  return (\n    <PdfFrame\n      field={field}\n      left={left}\n      top={top}\n      width={width}\n      height={height}\n      active={active}\n      pulse={pulse}\n      onHover={onHover}\n      onLeave={onLeave}\n    >\n      {(state) => (\n        <button\n          type=\"button\"\n          onFocus={() => onFocus(field.id)}\n          onClick={(event) => {\n            event.stopPropagation();\n            onFocus(field.id);\n          }}\n          style={{\n            width: \"100%\",\n            height: \"100%\",\n            border: \"none\",\n            background: \"transparent\",\n            padding: \"0 8px\",\n            display: \"flex\",\n            alignItems: \"center\",\n            justifyContent: \"space-between\",\n            gap: 6,\n            fontSize: 14,\n            fontWeight: 700,\n            color: field.value ? EDS_COLOR.text.primary : state.border,\n            cursor: \"pointer\",\n            textAlign: \"left\",\n          }}\n        >\n          <span\n            style={{\n              flex: 1,\n              minWidth: 0,\n              overflow: \"hidden\",\n              textOverflow: \"ellipsis\",\n              whiteSpace: \"nowrap\",\n            }}\n          >\n            {field.value || \"선택해주세요\"}\n          </span>\n          <ChevronDown size={16} strokeWidth={2.5} />\n        </button>\n      )}\n    </PdfFrame>\n  );\n}\n\n/** DIRECT: 문서 위 CHECKBOX/RADIO mark. Select 트리거와 별도 컴포넌트입니다. */\nfunction PdfChoice({\n  field,\n  selected,\n  left,\n  top,\n  active,\n  pulse,\n  checkbox = false,\n  onClick,\n  onHover,\n  onLeave,\n}) {\n  const [hovered, setHovered] = useState(false);\n  const groupHasValue =\n    field.group &&\n    (Array.isArray(field.value)\n      ? field.value.length > 0\n      : Boolean(field.value));\n  const doneGroup = selected || groupHasValue;\n  const state = doneGroup ? FIELD_STATE.completed : getFieldStateKey(field);\n  const emphasized = pulse || active;\n  const baseTone = doneGroup\n    ? \"completed\"\n    : field?.required\n      ? \"required\"\n      : \"optional\";\n  const color = doneGroup\n    ? FIELD_STATE.completed.border\n    : emphasized\n      ? EDS_COLOR.border.focus\n      : state.border;\n  const shadow =\n    doneGroup && (emphasized || hovered)\n      ? FIELD_SHADOW.completed\n      : emphasized\n        ? focusShadow\n        : hovered\n          ? FIELD_SHADOW[baseTone]\n          : \"none\";\n  return (\n    <button\n      ref={field.ref}\n      className={pulse ? \"field-pulse\" : \"\"}\n      type=\"button\"\n      aria-label={field.label}\n      onTouchStart={(e) => e.stopPropagation()}\n      onMouseEnter={(e) => {\n        setHovered(true);\n        onHover?.(field, e.currentTarget);\n      }}\n      onMouseLeave={() => {\n        setHovered(false);\n        onLeave?.();\n      }}\n      onClick={(e) => {\n        e.stopPropagation();\n        onClick(field.id);\n      }}\n      style={{\n        position: \"absolute\",\n        left,\n        top,\n        width: 24,\n        height: 24,\n        border: `${FIELD_BORDER_W}px solid ${color}`,\n        borderRadius: checkbox ? RADIUS.scale.xs : \"50%\",\n        background: selected ? EDS_COLOR.text.success : state.bg,\n        cursor: \"pointer\",\n        display: \"flex\",\n        alignItems: \"center\",\n        justifyContent: \"center\",\n        padding: 0,\n        boxShadow: shadow,\n        zIndex: emphasized ? 12 : 5,\n      }}\n    >\n      {selected &&\n        (checkbox ? (\n          <Check size={14} color={EDS_COLOR.background.surface} strokeWidth={3} />\n        ) : (\n          <span\n            style={{\n              width: 10,\n              height: 10,\n              borderRadius: \"50%\",\n              background: EDS_COLOR.background.surface,\n            }}\n          />\n        ))}\n    </button>\n  );\n}\n\n/** DIRECT: 문서 위 날짜 필드에 EDS FIELD.player/date 규격을 적용합니다. */\nfunction PdfDate({\n  field,\n  left,\n  top,\n  width,\n  height,\n  active,\n  pulse,\n  completeOnClick = false,\n  onFocus,\n  onHover,\n  onLeave,\n}) {\n  const [hovered, setHovered] = useState(false);\n  const state = getFieldStateKey(field);\n  const completed = isFilled(field);\n  const emphasized = pulse || active;\n  const baseTone = completed\n    ? \"completed\"\n    : field?.required\n      ? \"required\"\n      : \"optional\";\n  const color = completed\n    ? FIELD_STATE.completed.border\n    : emphasized\n      ? EDS_COLOR.border.focus\n      : state.border;\n  const shadow =\n    emphasized && completed\n      ? FIELD_SHADOW.completed\n      : emphasized\n        ? focusShadow\n        : hovered\n          ? FIELD_SHADOW[baseTone]\n          : \"none\";\n  const openPicker = (e) => {\n    e.stopPropagation();\n    onFocus(field.id);\n\n    // PC에서는 날짜/시간 박스를 선택하는 것만으로 프로토타입 완료 처리합니다.\n    // 모바일·태블릿에서는 Bottom Sheet에서 Picker 값을 선택합니다.\n    if (completeOnClick && !field.value) {\n      field.setter(getPrototypeDateTimeValue());\n    }\n  };\n  return (\n    <div\n      ref={field.ref}\n      className={pulse ? \"field-pulse\" : \"\"}\n      onTouchStart={(e) => e.stopPropagation()}\n      onMouseEnter={(e) => {\n        setHovered(true);\n        onHover?.(field, e.currentTarget);\n      }}\n      onMouseLeave={() => {\n        setHovered(false);\n        onLeave?.();\n      }}\n      style={{\n        position: \"absolute\",\n        left,\n        top,\n        width,\n        height,\n        zIndex: emphasized ? 12 : 6,\n      }}\n    >\n      <button\n        type=\"button\"\n        onClick={openPicker}\n        style={{\n          width: \"100%\",\n          height: \"100%\",\n          borderRadius: RADIUS.scale.xs,\n          border: `${FIELD_BORDER_W}px solid ${color}`,\n          background: state.bg,\n          boxShadow: shadow,\n          padding: \"0 8px\",\n          display: \"flex\",\n          alignItems: \"center\",\n          justifyContent: \"flex-start\",\n          gap: 6,\n          cursor: \"pointer\",\n          overflow: \"hidden\",\n        }}\n      >\n        <CalendarDays size={16} color={completed ? EDS_COLOR.text.primary : color} />\n        <span\n          style={{\n            flex: 1,\n            minWidth: 0,\n            overflow: \"hidden\",\n            textOverflow: \"ellipsis\",\n            whiteSpace: \"nowrap\",\n            fontSize: 14,\n            fontWeight: 800,\n            color: completed ? EDS_COLOR.text.primary : color,\n            textAlign: \"left\",\n          }}\n        >\n          {field.value || \"날짜 / 시간 선택\"}\n        </span>\n      </button>\n    </div>\n  );\n}\n\nfunction PdfFile({\n  field,\n  left,\n  top,\n  width,\n  height,\n  active,\n  pulse,\n  onFocus,\n  onHover,\n  onLeave,\n}) {\n  const [hovered, setHovered] = useState(false);\n  const inputRef = useRef(null);\n  const fileName = field.value?.name;\n  const state = getFieldStateKey(field);\n  const completed = isFilled(field);\n  const emphasized = pulse || active;\n  const baseTone = completed\n    ? \"completed\"\n    : field?.required\n      ? \"required\"\n      : \"optional\";\n  const color = emphasized && !completed ? EDS_COLOR.border.focus : state.border;\n  const shadow =\n    emphasized && completed\n      ? FIELD_SHADOW.completed\n      : emphasized\n        ? focusShadow\n        : hovered\n          ? FIELD_SHADOW[baseTone]\n          : \"none\";\n  return (\n    <>\n      <button\n        ref={field.ref}\n        className={pulse ? \"field-pulse\" : \"\"}\n        type=\"button\"\n        onTouchStart={(e) => e.stopPropagation()}\n        onMouseEnter={(e) => {\n          setHovered(true);\n          onHover?.(field, e.currentTarget);\n        }}\n        onMouseLeave={() => {\n          setHovered(false);\n          onLeave?.();\n        }}\n        onClick={(e) => {\n          e.stopPropagation();\n          onFocus(field.id);\n          inputRef.current?.click();\n        }}\n        style={{\n          position: \"absolute\",\n          left,\n          top,\n          width,\n          height,\n          borderRadius: RADIUS.scale.xs,\n          border: `${FIELD_BORDER_W}px solid ${color}`,\n          background: state.bg,\n          boxShadow: shadow,\n          padding: \"0 8px\",\n          display: \"flex\",\n          alignItems: \"center\",\n          gap: 8,\n          cursor: \"pointer\",\n          zIndex: emphasized ? 12 : 6,\n        }}\n      >\n        <Paperclip size={20} color={color} />\n        <span\n          style={{\n            flex: 1,\n            fontSize: 14,\n            fontWeight: 700,\n            color: fileName ? EDS_COLOR.text.primary : color,\n            textAlign: \"left\",\n          }}\n        >\n          {fileName || \"파일 첨부\"}\n        </span>\n        {fileName && <Check size={15} color={EDS_COLOR.text.success} strokeWidth={3} />}\n      </button>\n      <input\n        ref={inputRef}\n        type=\"file\"\n        style={{ display: \"none\" }}\n        onChange={(e) => {\n          const file = e.target.files?.[0];\n          if (file) field.setter({ name: file.name });\n          e.target.value = \"\";\n        }}\n      />\n    </>\n  );\n}\n\nfunction PdfLabel({ children, left, top, width = 90 }) {\n  return (\n    <span\n      style={{\n        position: \"absolute\",\n        left,\n        top,\n        width,\n        height: 18,\n        fontSize: 14,\n        fontWeight: 700,\n        lineHeight: \"18px\",\n        color: EDS_COLOR.text.primary,\n        zIndex: 2,\n        pointerEvents: \"none\",\n      }}\n    >\n      {children}\n    </span>\n  );\n}\n\n/** DIRECT: 날짜·시간 선택 트리거에 EDS FIELD_BUTTON/L/Type A를 적용합니다. */\n// ============================================================================\n// 8. 우측 입력 패널 컴포넌트\n// ============================================================================\n\nfunction PanelDateField({ field, active, onFocus }) {\n  const openPicker = () => {\n    onFocus(field.id);\n\n    // PC 패널에서는 박스를 선택하면 예시 날짜/시간을 저장해 완료 처리합니다.\n    if (!field.value) {\n      field.setter(getPrototypeDateTimeValue());\n    }\n  };\n  return (\n    <div style={{ position: \"relative\" }}>\n      <EdsFieldButton\n        value={field.value}\n        placeholder=\"날짜 / 시간 선택\"\n        active={active}\n        onClick={openPicker}\n        ariaLabel={`날짜 / 시간 선택. 현재 선택: ${field.value || \"없음\"}`}\n        suffixIcon={<CalendarDays size={20} />}\n      />\n    </div>\n  );\n}\n\n/**\n * DIRECT: EDS SELECT/L과 SELECT.dropdownItem/M 규격을 적용합니다.\n * - Trigger: 48px, 좌우 16px, radius.lg\n * - Dropdown Item: 44px, 좌우 16px, radius.md\n * - Hover: Gray[100]\n * - Selected: 배경 변화 없이 fontWeight 700 + trailing check\n * - 비선택 항목도 check 슬롯을 확보해 텍스트 밀림을 방지합니다.\n */\nfunction PanelSelectField({ field, active, onFocus }) {\n  const [open, setOpen] = useState(false);\n  const [hoveredTrigger, setHoveredTrigger] = useState(false);\n  const [hoveredOption, setHoveredOption] = useState(null);\n  const rootRef = useRef(null);\n  const filled = isFilled(field);\n  const focused = active || open;\n\n  const triggerBorderColor = filled\n    ? EDS_COLOR.text.success\n    : focused\n      ? EDS_COLOR.border.focus\n      : hoveredTrigger\n        ? EDS_COLOR.border.strong\n        : EDS_COLOR.border.default;\n\n  const triggerBorderWidth = focused || filled ? 2 : 1;\n  const triggerShadow = focused\n    ? filled\n      ? FIELD_SHADOW.completed\n      : focusShadow\n    : \"none\";\n\n  useEffe
